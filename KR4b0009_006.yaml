front:
  text: 箋註陶淵明集卷之六
  hash: sha256:280c32d2cd4218f5a7f39054d99aee07ab3c7f605a1dfb791f153ade4b03bca4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_006-1a}
body:
  text: 感士不遇賦并序昔董仲舒作士不遇賦司馬子長又爲之余嘗以三餘之日講習之暇讀其文慨然惆悵夫履信思順生人之善行抱朴守静君子之篤素自真風告逝大僞斯興閭閻懈廉退之莭市朝驅易進之心懷正志道之士或潜玉於當年㓗巳清操之人或沒丗以徒勤故夷皓有安歸之歎三閭發已矣之哀悲夫寓形百年而瞬息巳盡立行之難而一城莫賞此古人所以染翰慷慨屢伸而不能巳者也夫導逹意氣其惟文乎撫卷躊躇遂感而賦之咨大塊之受氣何斯人之獨靈禀神智以藏照秉三五而埀名或擊壤以自歡韻語陽秋曰藝經云壤以朩爲之前廣後㣣長尺四寸濶三寸其形如履將戯先側逺三四十歩以千中壌擊之中者爲上盖古戯也或大済於蒼生靡潜躍之非分常傲然以稱情世流浪而遂徂物群分以相形宻網裁而魚駭宏羅制而鳥驚彼逹人之善覺乃逃禄而歸耕山嶷嶷而懷影川汪汪而藏聲望軒唐而永歎甘貧賤以辭榮淳源汨以長分美惡作以異途原百行之攸貴莫爲善之可娯奉上天之成命師聖人之遺書發忠孝於君親生信義於郷閭推誠心而獲顯不矯然而祈譽嗟乎雷同毀異物惡其上妙筭者謂迷直道者云妄坦至公而無猜卒蒙恥以受謗雖懷瓊而握蘭徒芳㓗而誰亮哀哉士之不遇巳不在炎帝帝魁之世獨祗脩以自勤豈三省之或廢庶進徳以及時時旣至而不恵無爰生之晤言爰盎念張季之終蔽釋之愍馮叟於郎署唐頼魏守以納計尚雖僅然於必知亦苦心而曠歲審夫市之無虎眩三夫之獻說悼賈傳之秀㓪紆逺轡於促界悲董相之淵致屢乗危而幸濟感哲人之無偶淚淋浪以灑𬒮承前王之清誨曰天道之無親澄得一以作鍳恒輔善而佑仁夷投老以長飢回早天而又貧傷請車以備槨悲茹薇而殞身雖好學與行義何死生之苦辛疑報德之若兹懼斯言之虚陳何曠丗之無才罕無路之不澀色立切不滑也伊古人之慷慨病竒名之不立廣結髮以從政不愧賞於萬邑屈雄志於戚竪竟尺土之莫及留誠信於身後慟衆人之悲泣啇盡規以拯弊言始順而患入奚良辰之易傾胡害勝其乃急蒼旻遐緬人事無巳有感有昧疇測其理寕固窮以濟意不委曲而累巳旣軒冕之非榮豈緼𫀆之爲恥誠謬㑹以取拙且欣然而歸止擁孤襟以畢歲謝良價於朝市閑情賦𥘉張衡作定情賦蔡邕作静情賦檢逸辭而宗澹泊始則蕩以思慮而終歸閑正將以抑流宕之邪心諒有助於諷諌綴文之士弈代継作並固觸類廣其辭義余園閭多暇復染翰爲之雖文妙不足庻不謬作者之意乎夫何懐逸之令姿獨矌世以秀羣表傾城之艶色期有德於傳聞佩鳴玉以比絜齊幽蘭以争芬淡柔情於俗内負雅志於髙雲悲晨曦之易夕感人生之長勤同一盡於百年何歡寡而愁殷褰朱幃而正坐汎清瑟以自欣送纎指之餘好攘皓䄂之繽紛瞬美目以流眄含言笑而不分此章說莊姜容貌之美所冝親幸曲調將半景落西軒悲啇叩林白雲依山仰晜天路俯促鳴絃神儀嫵媚舉止詳妍激清音以感余願接膝以交言欲自徃以結誓懼冐禮之爲諐諐祛言切過失也說文愆字俗作愆待鳯鳥以致辭恐他人之我先意惶惑而靡寕魂須臾而九遷願在衣而爲領承華首之餘芳悲羅襟之宵離怨秋夜之未央願在裳而爲帶束窈窕之纎身嗟温凉之異氣或脫故而服新願在髪而爲澤刷玄鬢於頽肩悲佳人之屢沭從白水以枯煎願在眉而爲黛隨瞻視以閑揚悲脂粉之尚鮮或取毀於華粧願在莞而爲席安弱體於三秋悲文茵之代御方經年而見求願在絲而爲履附素足以周旋悲行止之有節空委棄於床前願在晝而爲影常依形而西東悲高樹之多䕃慨有時而不同願在夜而爲燭照玉容於兩楹悲扶桑之舒光奄㓕景而藏明願在竹而爲扇含凄飈於柔握悲白露之晨零顧襟袖以緬邈願在木而爲桐作膝上之鳴琴悲樂極以哀來終推我而輟音考所願而必違徒契契以苦心契泣結切擁勞情而罔訴歩容與於南林栖木蘭之遺露翳青松之餘隂儻行行之有覿交欣懼於中㦗竟寂寞而無見獨悁想以空尋歛輕𥚑以復路瞻夕陽而流歎歩徙倚以志趣色慘悽而矜顔葉爕爕以去條氣凄凄而就寒日負影以偕没月媚景於雲端鳥悽聲以孤歸獸索偶而不還悼當年之晚暮恨兹歲之欲殚思宵夢以從之神飄颻而不安若慿舟之失棹譬縁崖而無攀于時畢昴盈軒北風凄凄㤯㤯不寐衆念徘徊起攝帶以伺晨繁霜粲於素階雞歛翅而未鳴笛流逺以清哀始妙宻以閑和終寥亮而藏摧意夫人之在兹託行雲以送懷行雲逝而無語時奄冉而就過宋夲云行雲逝而不我留時亦奄冉而就過徒勤思以自悲終阻山而帶河迎清風以祛累寄弱志於歸波尤蔓草之爲㑹誦邵南之餘歌坦萬慮以存誠憇遥情於八遐昭明太子序云白璧微瑕惟在閑情一賦東坡曰淵明作閑情賦所謂國風好色而不滛正使不及周南與屈宋所陳何異而統大譏之此乃小兒強作觧事者箋註陶淵明集卷之六
