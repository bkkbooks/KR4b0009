front:
  text: 箋注陶淵明集卷之八
  hash: sha256:de6c42f4b2d3f8a8906f49ec884d1a9813be7a67f8ae7db32aea54fe44d933d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_008-1a}
body:
  text: 與子􅌂等疏告􅌂俟份佚佟天地賦命生必有死自古賢聖誰能獨免子夏有言死生有命冨貴在天四友之人親受音㫖發斯談者將非窮逹不可妄求壽夭永無外請故耶吾年過五十少而窮苦每以家弊東西游走性剛才拙與物多忤自量為巳必貽俗患僶俯辭丗使汝等幼而飢寒余嘗感孺仲賢妻之言敗絮自擁何慙兒子此既一事矣但恨鄰靡二仲室無萊婦抱兹苦心良獨內愧少學琴書偶愛間靜開卷有得便欣然志食見樹木交䕃時鳥變聲亦復歡然有喜常言五六月中北窗下卧遇凉風暫至自謂是羲皇上人意淺識罕謂斯言可保日月遂往機巧好踈緬求在昔眇然如何疾患以來漸就裴損親舊不遺每以藥石見救自恐大分將有限也汝輩稚小家貧每役柴水之勞何時可免念之在心若何可言然汝等雖曰同生曰一作不當思四海皆兄弟之義鮑叔管仲分財無猜歸生伍舉班荆道舊遂能以敗為成因喪立功他人尚爾况同父之人哉頴川韓元長名融漢末名士身處卿佐七十而終集本作八十兄弟同居至于沒齒濟北汜音凡稚春晋書泛育字稚春晋時操行人也七丗同財家人無怨色詩曰髙山仰止景行行止雖不能爾至心尚之汝其慎哉吾復何言東坡曰吾於淵明豈獨好其詩哉如其為人實有感焉淵明告􅌂等疏此語蓋實録也吾真有此病而不蚤自知半丗出仕以犯大患此所以深愧淵明欲以晚節師範其萬一也趙泉山曰或疑此疏規規遺訓似過為身後慮者是大不然且父子之道天性也何可廢乎靖節當易簀之際猶不忘詔其子以人倫大義欲表正風化與夫素隱行怪徒潔身而亂大倫者異矣又曰吾年過五十少而窮苦每以家弊東西游走當作年過三十按靖節從此十一年間自潯陽至建業再返又至江陵再返故云東西游走及四十一歲序其倦游於歸去來云心憚逺役四十八歲答龐參軍詩云我實幽居士無復東西緣若年過五十時投間十年矣尚何游䆠之有東孰燕談曰淵明與子􅌂疏余嘗感儒仲賢妻之言集本作孺今徙漢書敗絮自擁何慙兒子此既一事矣但恨鄰靡二仲室無萊婦抱兹苦心良獨內愧按范曄後漢書王霸傳霸字儒仲又列女傳霸少立髙節光武時連徴不仕霸與同郡令狐子伯為友後子伯為楚相而其子為郡功曹子伯遣子奉書於霸客去而久卧不起妻怪問其故霸曰向見令狐子容服甚光舉措有適而我兒蓬髮歷齒未知禮則見客而有慚色父子恩深不覺自失耳妻曰君少修清節不顧榮祿今子伯之貴孰與君之髙君躬勤苦子安得不耕以養既耕安得不黃頭歷齒奈何忘宿志而慙兒女子乎霸屈起而笑曰有是哉遂共終身隱遁又嵆康髙士傳求仲羊仲皆治車為業挫廉逃名蔣元卿之去兖州還杜陵荆棘塞門舍中有三徑不出唯二人從之游時人謂之二仲亦載三輔决録又劉向列女傳楚老萊子逃丗耕於蒙山之陽莞葭為墻蓬蒿為室衣緼飲水食菽懇山播種五榖或言於楚王曰老萊隱士也王使人聘以璧帛不來王遂駕至老萊之門老萊方織畚王曰願先生臨之老萊子曰僕山野之人也不足以守政王復曰願終變先生之志老萊子曰諾王去有間其妻戴畚挾薪而來謂老萊子曰是何車跡之衆也老萊子曰楚王欲使吾守楚國之政妻曰子許之乎老萊子曰然妻曰妾聞之可食以酒肉者可隨以鞭捶可授以官祿者可隨以鈇鉞今先生食人之酒肉受人之官祿此皆人之所制也居亂丗而為人所制能免於患乎老萊子遂隨其妻至於江南而止祭程氏妹文維晉義熙三年五月甲辰程氏妹服制再周淵明以少牢之奠俯而酹之嗚呼哀哉寒往暑來日月寖踈梁塵委積庭草荒蕪寥寥空室哀哀遺孤肴觴虛奠人逝焉如誰無兄弟人亦同生嗟我與爾特百常情謝玄傳痛百常情作迫非慈妣庶母早丗時尚孺嬰我年二六爾才九齡爰從靡識撫髫相成咨爾令妹有德有操靖恭鮮言聞善則樂能正能和惟友惟孝行止中閨可象可效我聞為善慶自巳蹈彼蒼何偏而不斯報昔在江陵重罹天罰晋安帝隆安五年秋七月赴駕還江陵是冬母孟氏卒兄弟索居乖隔楚越伊我與爾百哀是切黯黯髙雲蕭蕭冬月白雲掩晨長風悲節感惟崩號興言泣血尋念平昔觸事未逺書疏猶存遺孤滿眼如何一往終天不返寂寂髙堂何時復踐藐藐孤女曷依曷恃焭焭遊魂誰主誰祀奈何程妹於此永巳死如有知相見蒿里嗚呼哀哉祭從弟敬逺文歲在辛亥月惟仲秋旬有九日從弟敬逺卜辰云窆永寧后土感平生之游處悲一往之不返情惻惻以摧心淚愍愍而盈眼乃以園果時醪祖其將行嗚呼哀哉於鑠吾弟有操有槩孝發幼齡友自天愛少思寡欲靡執靡介後巳先人臨財思惠心遺得失情不依世其色能溫其言則厲樂勝朋髙好是文藝遙遙帝鄉爰感竒心絶粒委務考槃山隂淙淙在宗切水聲也懸溜曖曖荒林晨採上藥夕間素琴曰仁者壽竊獨信之如何斯言徒能見欺年甫過立奄與世辭長歸蒿里邈無還期惟我與爾匪但親友父則同生母則從母從音縱爾雅曰母之姊妹為從母相及齠齒齠與齔義同毀齒也家語曰男子八歲而齔齠音條齔音櫬並罹偏咎靖莭年三十七母孟氏卒是偏咎為失怙也斯情實深斯愛實厚念疇昔日同房之歡冬無緼褐夏渴瓢簞相將以道相開以顔豈不多乏忽忘飢寒余嘗學仕纒綿人事流浪無成懼負素志斂䇿歸來爾知我意常願携手置彼衆意每憶有秋我將其刈與汝偕行舫舟同濟三宿水濵樂飲川界靜月澄髙溫風始逝撫杯而言物久人脆奈何吾弟先我離丗事不可尋思亦何極日徂月流寒暑代息死生異方存亡有域候晨永歸指塗載陟􅈱􅈱遺稚未能正言哀哀嫠人寡婦也禮儀孔間庭樹如故齊宇廓然孰云敬逺何時復還余惟人斯昧兹近情蓍龜有吉制我祖行望旐翩翩執筆涕盈神其有知昭余中誠嗚呼哀哉自祭文歲惟丁卯律中無射天寒夜長風氣蕭索音瑟陶子將辭逆旅之館永歸於本宅故人悽其相悲同祖行於今夕羞以嘉𬞞薦以清酌候顔巳冥聆音愈漠嗚呼哀哉茫茫大塊悠悠髙旻是生萬物余得為人自余為人逢運之貧簞瓢屢罄絺綌冬陳含歡谷汲行歌負薪翳翳柴門事我宵晨春秋代謝有務中園載耘載耔乃育乃繁欣以素牘和以七弦冬曝其日夏濯其泉勤靡餘勞心有常閒樂天委分以至百年惟此百年夫人愛之懼彼無成揭日惜時存為丗珍沒亦見思嗟我獨邁曽是異兹寵非巳榮涅豈吾緇捽兀窮廬酣飲賦詩識運知命疇能罔眷余今斯化可以無恨壽涉百齡身慕肥遁從老得終奚所復戀寒暑逾邁亡既異存外姻晨來良友宵奔葬之中野以安其魂窅窅我行窅烏了切深目也蕭蕭墓門奢侈宋臣儉笑王孫廓兮巳滅慨為巳遐不封不樹日月遂過匪貴前譽孰重後歌人生實難死如之何嗚呼哀哉此文乃靖莭之絶筆也東坡曰淵明自祭文出妙語於纊息之餘豈涉死生之流哉箋注陶淵明集卷之八
