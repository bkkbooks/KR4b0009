front:
  text: 箋注陶淵明集卷之一
  hash: sha256:4f4840ce2d3ea08f5df0a2dab68523ec338c8922da20a173d02552e6a38c131a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_001-1a}
body:
  text: 詩四言劉後村曰四言自曹氏父子王仲宣陸士衡後惟陶公最髙停雲榮木等篇殆突過建安矣又曰四言尤難以三百五篇在前故也停雲停雲思親友也樽湛新醪湛讀曰沉園列𥘉榮願言不從歎息彌襟靄靄停雲濛𪷟時雨八表同昏平路伊阻靜寄東軒春醪獨撫良朋悠邈搔首延佇停雲靄靄時雨𪷟𪷟八表同昏平陸成江二句蓋寓飈回霧塞陵遷谷變之意有酒有酒閒飲東窗願言懷人舟車靡從東園之樹枝條再榮競用新好以招余情謂相招以事新朝也人亦有言日月于征安得促席說彼平生翩翩飛鳥息我庭柯斂翮閒止好聲相和豈無他人念子實多願言不獲抱恨如何髙元之曰以停雲名篇乃周詩六義二曰賦四曰興之遺義也時運時運游暮春也春服既成景物斯和偶影獨游欣慨交心邁邁時運穆穆良朝襲我春服薄言東郊山滌餘靄宇曖微霄有風自南翼彼新苗洋洋平津乃漱乃濯邈邈遐景載欣載矚矚之欲切視也稱心而言人亦易足揮兹一觴陶然自樂延目中流悠悠清沂魚衣切水名出泰山童冠齊業閒詠以歸我愛其靜寤寐交揮但恨殊丗邈不可追斯晨斯夕言息其廬花藥分列林竹翳如清琴橫床濁酒半壷黃唐莫逮慨獨在余史記曰黃帝為有熊帝堯為陶唐湯東澗曰閒詠以歸我愛其靜靜之為言謂其無外慕也亦庶乎知浴沂者之心矣榮木榮木念將老也日月推遷已復有夏總角聞道白首無成采采榮木結根于兹晨耀其華夕已喪之人生若寄憔悴與憔悴同有時靜言孔念中心悵而采采榮木于兹托根繁華朝起慨暮不存貞脆由人禍福無門匪道曷依匪善奚敦嗟豫小子禀兹固陋徂年既流業不增舊志彼不舍安此日冨或曰志當作忘荀子功在不舍詩一醉日冨蓋自咎其廢學而樂飲云爾我之懷矣怛焉內疚先師遺訓余豈云墜四十無聞斯不足畏脂我名車䇿我名驥千里雖遙孰敢不至趙泉山曰四十無聞斯不足畏按晉元興三年甲辰劉敬宣以破桓歆功遷建威將軍江州刺史鎮潯陽辟靖節參其軍事時靖節年四十也靖節當年抱經濟之器藩輔交辟遭時不競將以振復宗國為己任回翔十載卒屈于戎幕佐吏用是志不獲騁而良圗弗集明年决䇿歸休矣贈長沙公族祖長沙公於余為族一作余於長沙公為族祖同出大司馬漢髙帝時陶舍昭穆既逺巳為路人經過潯陽臨别贈此同源分流人易丗踈慨然寤歎念兹厥𥘉禮服遂悠歲月眇徂感彼行路眷然躊躇於穆令族允構斯堂諧氣冬暄映懷圭璋爰采春花載警秋霜我曰欽哉實宗之光伊余云遘在長忘同笑言未久逝焉西東遙遙三湘寰宇記湘潭湘鄉湘源為三湘滔滔九江山川阻逺行李時通何以寫心貽此話言進簣雖微終焉為山敬哉離人臨路悽然𣢾襟或遼音問其先楊誠齊曰同源分流人易丗踈慨然寤歎念兹厥𥘉老泉族譜引正淵明詩意而淵明字少意多尤可涵詠西蜀張縯辨證曰年譜以此詩為元嘉乙丑作按晉書載長沙公侃卒長子夏以罪廢次子瞻之子宏襲爵宏卒子綽之嗣綽之卒子延壽嗣宋受晋禪延壽降為吳昌侯若謂詩作於元嘉則延壽已改封吳昌非長沙矣先生詩云伊余云遘在長忘同蓋先生丗次為長視延壽乃諸父行序云余於長沙公為族或云長沙公於余為族皆以族字斷句不稱為祖蓋長沙公為大宗之傳先生不欲以長自居故詩稱於穆令族序稱於余為族又云我曰欽哉實宗之光皆敬宗之義也如年譜以族祖族孫為稱乃是延壽之子延壽已為吳昌侯其子又安得稱長沙公哉要是此詩作於延壽未改封之前酬丁柴桑柴桑陽故里有客有客爰來爰止秉直司聰于惠百里餐勝如歸聆善若始匪惟諧也屢有良由載言載眺以寫我憂放歡一遇既醉還休實欣心期方從我遊答龐參軍龐為衛軍參軍從江陵使上都過潯陽見贈衡門之下有琴有書載彈載詠爰得我娛豈無他好樂是幽居朝為灌園夕偃蓬廬人之所寶尚或未珍不有同愛云胡以親我求良友實覯懷人歡心孔洽棟宇惟鄰時新居南里之南村即栗里鄰新居鄰也伊余懷人欣德孜孜我有㫖酒與汝樂之乃陳好言乃著新詩一日不見如何不思嘉遊未斁誓將離分送爾于路銜觴無欣依依舊楚邈邈西雲之子之逺良話曷聞昔我云别倉庚載鳴今也遇之霰雪飄零大藩有命作使上京豈忘宴安王事靡寧慘慘寒日肅肅其風翩彼方舟容裔江中勗哉征人在始思終敬兹良辰以保爾躬勸農悠悠上古厥𥘉生人傲然自足抱朴含真智巧既萌資待靡因誰其贍之實賴哲人哲人伊何時為后稷贍之伊何實曰播殖舜既躬耕禹亦稼穡逺若周典八政始食熙熙令音猗猗原陸卉木繁榮和風清穆紛紛士女趍時競逐桑婦宵征農夫野宿氣莭易過和澤難久冀缺携儷左傳僖三十三年舅季使過兾見兾缺耨其妻饁之敬相待如賔與之歸沮溺結耦相彼賢逹猶勤壟畒矧伊衆庶曵𥚑拱手民生在勤勤則不匱宴安自逸歲暮奚冀儋石不儲儋石言一儋一石應劭曰齊人名罌為儋石受二斛漢書音義曰儋一斗之儲飢寒交至顧爾儔列能不懷愧孔耽道德樊須是鄙董樂琴書田園不履若能超然投迹髙軌敢不斂祍敬讃德美命子悠悠我祖爰自陶唐邈為虞賔歷丗重光陶丗之先曰伊祈氏升唐侯為天子後遜于虞作游陶立故號陶唐氏而諡曰堯取散冝氏之女曰女皇生丹朱復有庶子九人及舜初郊于唐以丹朱為尸因封於唐御龍勤夏豕韋翼啇時董父好龍舜命豢龍於陶丘而堯之庶子奉先之祀於陶丘者或丗業豢龍逮夏帝孔甲時天降雌雄龍二于庭有劉纍者實堯之裔纍以擾龍事孔甲賜之姓御龍氏龍一雌死帝既饗復求御龍氏懼遷魯山祝融之後封於豕韋啇武丁滅之以封劉纍之胄穆穆司徒左傳載啇民七族陶氏其一也陶氏授民是為司徒蓋豕韋之後陶姓始經見於此厥族以昌原陶姓氏族之所自來也紛紛戰國漠漠衰周鳯隱於林幽人在丘逸蚪繞雲蚪竒摎切俗作蛇非無角龍也奔鯨駭流二句喻狂暴縱橫之亂也天集有漢眷豫愍侯髙帝功臣表開封愍侯陶舍以左司馬從漢破代封侯於赫愍侯運當攀龍撫劒夙邁顯茲武功肅矣我祖慎終如始直方二臺惠和千里陶荗麟譜以岱為祖按此詩云惠和千里當從晋史以茂為祖陶茂為武昌大守於皇仁考淡焉虛止寄迹風雲置兹愠喜父姿城大守生五子史失載嗟余寡陋瞻望弗及顧慚華鬢負影隻立三千之罪無後為急我誠念哉􅈱聞爾泣卜云嘉日占亦良時名汝曰儼字汝求思溫恭朝夕念兹在兹尚想孔伋庶其企而孔伋因求思而言韋玄成詩誰謂華髙企其齊而誰謂德難厲其庶而厲夜生子遽而求火莊子天地篇厲之人半夜生其子遽取火而視之汲汲然惟恐其似己也凡百有心奚特於我既見其生實欲其可人亦有言斯情無假日居月諸漸免于孩福不虛至禍亦易來夙興夜寐願爾斯才爾之不才亦巳焉哉張縯曰先生髙蹈獨善宅志超曠視世事無一可芥其中者獨於諸子拳拳訓誨有命子詩有責子詩有告儼等疏先生既厚積於躬薄取於世其後冝有興者而六代之際迄無所聞此亦先生所謂天道幽且逺鬼神茫昧然者也靖節之裔不見於傳獨袁郊井澤謡云陶峴彭澤之後開元中家于崑山又曰杜子美嘲先生云有子賢與愚何其掛懷抱此固以文為戲耳驥子好男兒若以是嘲子美譽兒亦豈不可哉趙泉山曰靖節之父史逸其名惟載於陶茂麟家譜而其行事亦無從考見惟命子詩曰於皇仁考淡焉虛止寄迹風雲置兹愠喜其父子風規蓋相類歸鳥翼翼歸鳥晨去于林逺之八表近憩雲岑憩起例切息也和風不洽翻翮求心託言歸而求志下文豈思天路意同顧儔相鳴景庇清隂翼翼歸鳥載翔載飛雖不懷游見林情依遇雲頡頏相鳴而歸遐路誠悠性愛無遺翼翼歸鳥馴林徘徊豈思天路欣及舊棲雖無昔侣衆聲每諧日夕氣清悠然其懷翼翼歸鳥戢羽寒條游不曠林宿則森標晨風清興好音時交矰繳奚施繳之若切矰矢射也生絲縷也巳卷安勞卷與倦同箋注陶淵明集卷之一
