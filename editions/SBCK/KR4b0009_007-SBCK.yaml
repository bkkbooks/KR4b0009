front:
  text: 箋註陶淵明集卷之七
  hash: sha256:8488b5cfd1a98ee03fcfb80d587a5a437897d1d4eafd6b274c217c871253b0b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_007-1a}
body:
  text: 天子孝傳賛虞舜夏禹殷髙宗周文王虞舜父頑母嚚事之於畎畒之間以孝烝烝是以堯聞而授之冨有天下貴爲天子以爲不順於父母􅀂窮而無歸惟聞親可以得意苟違朝夕􅀂嬰兒之思戀故稱舜五十而慕書曰戞擊鳴球􅅮拊琴瑟以詠祖考來格言思其來而訓一作謂之愛敬盡於事親是以德教加於百姓刑于四海夏禹有天下以奉宗廟然躬自菲薄以厚其孝孔子曰禹吾無間然矣菲飲食而致孝乎􅀑神惡衣服而致羙乎黻冕禹之德於是稱聞聖人之德無以加於孝敬孝敬之道羙莫大焉殷髙宗諒隂三年不言百官揔巳而聽於􅃁宰三年而後言天下咸歡德教大行殷道以興詩曰一人有慶兆民頼之其此之謂乎周文王之爲丗子也朝於王季日三雞鳴至於寢門問於内竪内竪曰安文王乃喜不安則色憂行不能正履日中暮亦如之食上必視寒温之節食下必問所膳而後退文王孝道光大其化自近至逺刑干寡妻以御于家􅀖故得萬國之歡心以事其先王矣賛曰至哉后德聖敬自天陶漁致飬菲薄饗先親瘠色憂諒隂寑言一人有慶千載頼旃諸侯孝傳賛周公旦魯孝公河間惠王周公旦武王之弟成王㓜少周公攝政制禮作樂郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來􅀕詩曰於穆清廟肅雍顯相言諸侯樂其位而敬其事也仲尼曰孝莫大於嚴父嚴父莫大於配天則周公其人也貴而不驕位髙彌謙自承文武之休烈孝道通于神明光􅀍四海武王封之於魯備其禮樂以奉宗廟焉魯孝公之爲公子周宣王問公子能道訓諸侯者立之樊穆仲稱其孝曰肅恭明神而敬事􅂄老賦事行刑必問於遺訓咨於故實不干所問不犯所咨王曰然則能訓理其民矣乃命之於夷宫是爲孝公夫宗廟致敬不忘親也有國不亦冝乎漢河間惠王獻王之曽孫也西京藩臣多驕放之失其名德者唯獻王而恵王継之漢書稱其能脩獻王之行母薨服喪盡禮哀帝下詔書褒􅀭以爲宗室儀表増封萬户禮古之人皆然至於末俗衰薄固巳賢矣貴而率禮又難其見褒賞不亦冝乎賛曰貴驕殊途不期而㑹周公勞謙乃成光大二侯承魯遵儉去㤗河間率禮漢宗是頼卿大夫孝傳賛孔子孟莊子頴考叔孔子魯人也入則事父兄出則事公卿喪事不敢不勉故稱曰孝乎惟孝友于兄弟是亦爲政也君賜腥必熟而薦之雖􅂼食而齊􅀕如在郷人儺朝服立扵阼階孝之至也至德要道莫大於孝是以曽參受而書之㳺夏之徒常咨禀焉許止不甞藥書以殺父宰我暫言减喪責以不仁言合訓典行合丗範德義可尊作事可法遺文不朽揚名千載孟莊子魯人也孔子稱其孝其他可能也其不改父之政與父之臣是難能也夫孝子之事親也事亡如事存故當不義則爭之存所不爭則亡亦不敢改父之道猶謂之孝况終身乎頴考叔鄭人也莊公以叔叚之故與母􅊎曰不及黄泉無相見也既而悔之考叔爲封人聞之有獻於公公賜之食而舎肉公問之對曰小人有母未嘗君之􅃵請以遺之公曰汝有母遺繄我獨無考叔曰何謂也公語之故且告之悔考叔曰􅀂掘地及泉隧而相見其誰曰不然公從之遂爲母子如􅀄君子曰頴考叔純孝也愛其母而施及莊公詩云孝子不匱永􅃬爾􅀋其是之謂乎賛曰仁惟本悌聖亦基孝恂恂尼父固天攸造一作導二子承親式禮遵誥永􅃬純懿無改遺操士孝傳賛髙柴樂正子春孔􅁬黄香髙柴衛人也喪親泣血三年未嘗見齒所謂哭不偯言不文也爲武城宰而化行民有不服其親者改之行喪如禮君子之德風也以身先之而民不遺其親樂正子春魯人也下堂傷足旣瘳􅁆月不出猶有憂色曰吾聞之曽子父母全而生之巳全而歸之可謂孝矣故君子一舉足一出言不敢忘父母不敢毁傷孝之始也夫能敬慎􅀂斯而災患及者未之有也孔􅁬扶風人也少以孝行著名州里供飬至謹在官唯母極甘羙妻息菜食歴位以清夫人情莫不欲厚其親然亦有分焉􅁬則難繼能致儉以全飬者鮮矣黄香江夏人也九􅀊失思慕骨立事父竭力以致飬冬無􅀍袴而盡滋味暑則扇床枕寒則以身温席漢和帝嘉之特加異賜歴位㳟勤寵禄榮親可謂夙興夜寐無忝爾所生者也賛曰顯允群士行殊名鈞咸能夙夜以義榮親率彼城邑用化厥民忠以悟主其孝乃純庶人孝傳賛江革㢘範汝郁殷陶江革齊人也漢章帝時避賊􅀒母而逃賊賢之不害而告其生路竭力傭債以致甘暖和顔恱色以盡􅂬心欲親之安自挽車以行郷人歸之號曰江巨孝位至五官中郎將天子嘉焉寵遇甚厚告歸詔書褒羙就家禮其終身以􅂋異行㢘範京兆人也少􅀌十五入蜀迎父喪遇石舡覆範執骸一祚抱棺而没舩人救之僅免扵死遂以䘮歸及仕郡拯太守於危難送故盡節章帝時爲郡守百姓􅁔詠之夫孝者人之本教之所由生也是以範之臨危也勇宰民也恵能以義顯也汝郁陳郡人也五􅀊母病不食郁亦不食母憐之强食郁能察色知病輒復不食族人號曰異童年十五著於郷里父母終思慕致毀推財與兄弟隱於草澤君子以爲難况童齓孝於自然可謂天性也殷陶汝􅀯人也年十二以孝稱遭父憂率情合禮有長蛇帶其門舉家奔走陶以喪柩在馬獨居廬不動親戚扶持曉喻莫能移之帝號益盛由是顯名屡辤辟命夫智者不惑勇者不懼陶孝於其親而智勇並彰乎弱齡斯又難矣賛曰事親盡歡其難在色彼飬以禄我飬以力義在一作存愛敬榮不假飾嗟爾衆庻鑒兹前式扇上畫賛荷蓧丈人長沮桀溺於陵仲子張長公丙曼容鄭次都薛孟嘗周陽珪三五道邈淳風日盡九流參差牙相推隕形逐物遷心無常凖是以逹人有時而隠四軆不勤五榖不分超超丈人日夕在耘遼遼沮溺耦耕自欣入鳥不駭雜獸斯群至矣於陵飬氣浩然蔑彼結駟甘此灌園張生一仕曽以事還頋我不能髙謝人間岧岧丙公望崖輒歸匪驕匪􅈔前路威夷鄭叟不合垂鈞川湄交酌林下清言究微孟嘗逰學天網時踈眷言􅈒友振􅄄偕徂羙哉周子稱疾閑居􅀉心清尚悠然自娱翳翳衡門洋洋泌流曰琴曰書顧盻有儔飲河既足自外皆休緬懷千載託契􅀌逰箋註陶淵明集卷之七
