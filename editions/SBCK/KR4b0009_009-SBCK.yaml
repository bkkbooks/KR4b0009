front:
  text: 箋註陶淵明集卷之九
  hash: sha256:951a00f8b7321c599ee826b80e43e8167b0f9ce8919cf9ff3129f1b49eadf3f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_009-1a}
body:
  text: 集聖賢群輔録上明由暁升級宋均曰級䓁差政所先後也必育受稅俗宋均曰受賦稅及傜役所冝施爲也成􅀶受古諸朱均曰古諸侯職䓁也隕丘一作立受延嬉宋均曰延長嬉興也主受此録也右燧人四佐燧人出天四佐出洛宋均曰出天天所生出洛地所生也金提一作堤主化俗宋均曰爲民除災害也鳥明主建福宋均曰福利民也視黙主灾惡宋均曰爲民除灾􅁖也紀通爲中職宋均曰爲田主主内職也仲起爲海陸宋均曰主平地兼統海也陽侯爲江海宋均曰主江海事一本作江湖右伏羲六佐六佐出丗宋均曰宓戯不及燧人故増二佐出丗人所生也風后受金法宋均曰金法言能决理是非也天老受天籙宋均曰籙天教命也五聖受道級宋均曰級次序也知命受紏俗宋均曰紏正也窺紀受變復宋均曰有禍变能􅀘復也地典受州絡宋均曰絡維絡也力墨受準斥宋均曰準斥凡事也力墨或作力牧右黄帝七輔州選舉翼佐帝德自燧人四佐至七輔見論語摘輔􅁚重該脩熈右少昊四叔實能金木及水使重爲勾芒該爲蓐収脩及熈爲玄冥丗不失職遂濟窮桑見左傳蔡墨辭羲仲羲叔和仲和叔右羲和四子孔安國云即尭之四岳分掌四岳諸侯鄭玄云尭既分隂陽爲四時命羲仲和仲羲叔和叔䓁爲之官又主方岳之事是爲四岳見鄭尚書注伯夷爲陽伯楽舞侏離􅁔曰招陽羲仲之後爲羲伯楽舞􅮊哉􅁔曰􅀯陽棄爲夏伯楽舞武漫哉􅁔曰祈慮一無武字羲叔之後爲羲伯楽舞將陽􅁔曰朱華咎繇爲秋伯楽舞蔡淑􅁔曰零落和仲之後爲和伯楽舞􅁔曰歸來垂爲冬伯楽舞丹鳳一曰齊落􅁔曰齊楽一曰縵右八伯自羲和死後分置八伯舜既即位元祀廵狩每至其方各貢兩伯之樂天傳冬伯後闕一人鄭玄云此上下有脫辤其􅀃未聞十有五祀後又百工相和而􅁔慶雲八伯稽首而進者也見尚書大傳讙兠共工鯀三苗右四凶蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹右髙陽氏才子八人齊聖廣淵明允篤誠天下之民謂之八凱伯􅁬仲堪叔獻季仲伯虎仲熊叔豹季貍右髙辛氏才子八人忠肅恭懿宣慈惠和天不之民謂之八元從四㐫至此悉見左傳季文子辤禹作司空棄作稷契作司徒咎繇作士益作朕虞埀作共工伯夷作秩宗龍作納言作典樂右九官舜登帝位所選命見尚書雄陶方回續牙伯陽東不訾或云不識秦不虗或云不空靈甫右舜七友並爲歴山雷澤之㳺戰國筞顔􅢴云尭有九佐舜有七友而尸子只載雄陶䓁六人不載靈甫皇甫士安作逸士傳云視其友則雄陶方回續牙伯陽東不訾秦不空靈甫之徒是爲七子與戰國䇿相應禹稷契皐陶益右舜五臣見論語巳列九官中禹稷契皐陶伯夷垂益夔右八師見楚辭七諌伯夷禹稷右三后伯夷降典制民惟刑禹平水􅁟主名山川稷降播種農殖嘉榖三后成功惟殷于民漢太尉楊賜曰昔三后成功臯陶不與焉盖吝之也見尚書甫刑後漢書微子箕子比干右殷三仁論語曰微子去之箕子爲之奴比干諌而死孔子曰殷有三仁焉伯夷太公右二老尚書大傳曰太公避紂居東海之濵皆率其黨曰盍歸乎吾聞西伯昌善飬老此二人者盖天下之大老也徃而歸之是天下之父歸之也天下之父歸之其子􅂚徃孔融曰西伯以二老開王業閎夭太公望􅀯宮适散冝生右文王四友尚書大傳云閎夭􅀯宫适散冝生三子學于太公望望曰嗟乎西伯賢君也四子遂見西伯於羑里孔子曰文王有四臣丘亦得四友此四人則文王四隣也伯逹伯适仲突仲忽叔夜叔夏季隨季騧右周八士見論語賈逵以爲文王時鄭玄以爲成王時也伯邑考武王發管叔鮮周公旦蔡叔度曺叔振鐸霍叔武郕叔處康叔封聃季載一本無郕叔處有毛叔圉右太姒十子太史公曰太姒十子周以宗強見史記周公旦邵公奭太公望畢公毛公閔公太㒹􅀯宫适散冝生文母太姒也右周十亂見論語其四人巳列四友秦公牙呉班孫􅀹大夫冉賛公子麋右五王並能相焉尸子曰古有五王之相廼謂之王其貴之也狐偃趙衰顛頡魏武子司空季子右􅀳文公從亡五人叔向曰三十七年有士五人見左傳及􅀳太尉劉琨詩曰重耳慿五臣奄息仲行鍼虎右三良子車氏之子秦穆公没要以從死詩人悼之爲賦黄鳥見左傳毛詩子展賦草蟲子罕子子西賦􅁰苗子駟子子産賦隰桑子囯子公孫段賦桑扈子豊子伯有賦鶉之賁賁子良孫子耳子子大叔賦野有蔓草子㳺孫子矯子印叚賦蟋蟀子印孫子張子右鄭七穆謂之七子鄭穆公子十有一人罕駟豐印逰國良七人子孫並有才名丗任鄭國之政以免􅀳楚之難謂之七穆叔向曰鄭士穆氏其后亡乎及諸侯爲宋之盟鄭伯享趙武于垂隴七卿皆從文子曰七卿從君以寵武也請皆賦以卒君貺亦以􅀚七子之志見左傳又呉質書云趙武過鄭七子賦詩仲孫􅂖文伯獻子莊子孝伯僖子懿子武伯叔孫得臣莊叔穆子昭子成子武子文子季孫行父文子武子悼子平子桓子康子右魯􅁊公之曽孫丗秉魯政號曰三􅁊孔子曰三􅁊之子孫微矣見論語左傳趙無恤襄子趙衰始爲卿至無恤四丗范􅁻射昭子士㑹始爲卿至􅁻射五丗智瑶襄子荀首始爲卿至瑶六丗一荀寅文子荀林父始爲卿至寅四丗魏多襄子魏絳始爲卿至多四丗韓不信簡子韓厥始爲卿至不信四丗右六族丗爲晉卿並有功名此六人實弱晉國淳于越云卒有田常六卿之臣劉向亦曰田常復見於今六卿必起於漢見左傳史記漢書儀封人荷蕢晨門楚狂接輿長沮桀溺荷蓧丈人一作伯夷叔齊虞仲夷逸朱張柳下恵少連右作者七人論語曰賢者避丗其次避地其次避色其次避言孔子曰作者七人見包氏注董威賛詩曰洋洋乎􅄹耳哉而作者七人德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏右四科見論語顔回子貢子路子張右孔子四友文王有胥附奔奏先後禦侮謂之四隣孟懿子曰夫子亦有四隣乎子曰吾有四友焉自吾得回門人益親是非胥附乎自吾得賜逺方之士日至是非奔奏乎自吾得師前有光後有輝是非先後乎自吾得由惡言不至於門是非禦侮乎見孔叢子顔回冉伯牛子路宰我子貢公西華右六侍仲尼志意不立子路侍儀服不脩公西華侍禮不習子貢侍辭不辯宰我侍亡忽古今顔回侍節小物冉伯牛侍曰吾以夫六子自厲也見尸子檀子盼子黔夫種首右齊威王疆埸四臣齊威王與魏恵王㑹田於郊魏王問威王曰王有寶乎威王曰無有魏王曰􅀂寡人國雖小猶有徑寸之珠照前後車各十二乗者十枚奈何爲萬乗之國而無寶乎威王曰寡人之所以爲寶與王異吾臣有檀子者使守􅀯城則楚人不敢爲㓂東取泗上十二諸侯皆来朝吾臣有盼子者使守髙唐則魏人不敢東漁於河吾臣有黔夫者使守徐則燕人祭北門趙人祭西門徙而從之者七十餘家吾臣有種首者使備盗賊則道不拾遺以此爲寶將以照千乗豈直十二乗哉魏恵王慙不懌而去見史記及春秋後語齊孟甞君田文魏信陵君无忌趙平原君趙勝楚春申君黄歇右戰國四豪見史記太子少􅀓留文成侯韓張良相國鄼文終侯沛蕭何楚王淮隂侯韓信右三傑漢髙祖曰此三人人之傑也見漢書園公姓園名秉字宣明陳留襄邑人常居園中故號園公見陳留志綺里季夏黄公姓崔名廓字少通齊人隱居修道號夏黄公見崔氏譜甪里先生右啇山四皓當秦之末俱隠上洛啇山皇甫士安云並河内軹人見漢書及皇甫謐髙士傳太子太􅀓踈廣字仲翁宣帝本始四年魏相爲御史大夫薦廣於霍光時年六十以元康三年告退年六十七太子少􅀓踈受字公子廣兄子也右二踈東海人宣帝時並爲太子師􅀓毎朝太􅀓在前少􅀓在後朝廷以爲榮授太子論語孝經各以老疾告退時人謂之二踈見漢書重合令子輿居宋里櫟陽令子羽居東觀里東海太守子仲居宜唐里兖州刺史子明居西啇里潁陽令子良居遂興里右郡决曺􅁺汝􅀯周燕少卿之五子號曰五龍各居一里子孫並以儒素退讓爲業天下著姓見周氏譜及汝􅀯先賢傳龔勝字君賔龔舎字君倩或曰長倩右並楚人皆治清節丗號二龔見漢書唐林字子髙唐尊字伯髙右並沛人亦以絜履著名於成哀之丗號爲二唐比楚二龔後皆仕王莾見漢書左思曰二唐絜己乃􅀧反汙平阿侯王譚成都侯王啇紅陽侯王章曲陽侯王根髙平侯王逢時右並以元后弟同日受封京師號曰五侯並奢豪冨侈招賢下士谷永樓護皆爲賔客時人爲之語曰谷子雲之筆扎樓君卿之唇舌言出其門也見漢書張載詩曰冨侈擬五侯北海逢萌字子康北海徐房字平原李曇字子雲平原王遵字君公右皆懷德􅁾行不仕亂丗相與爲友時人號之四子見後漢書嵇康髙士傳求仲羊仲右二人不知何許人皆台車爲業挫㢘逃名一作丗蔣元卿之去兖州還杜陵荆􅁄塞門舎中有三逕不出惟二人從之游時人謂之二仲見嵇康髙士傳太傳髙宻元侯􅀯陽鄧禹字仲華大司馬廣平忠侯􅀯陽呉漢字子顔左將軍膠東剛侯􅀯陽賈復字君文建威大將軍好畤愍侯扶風耿弇字伯昭執金吾雍奴威侯上谷冦恂字子翼征西大將軍陽夏莭侯潁川馮異字公孫征􅀯大將軍舞陽壯侯􅀯陽岑彭字君然征虜將軍潁陽成侯頴川􅀕遵字弟孫太常靈壽侯信都邳􅊮字偉君東郡太守東筦成侯鉅鹿耿純字伯山上谷太守淮隂侯潁川王覇字元伯左中􅀰將朗陵愍侯潁川臧宫字君翁驃􅀐大將軍櫟陽侯馮翊景丹字孫卿驃􅀐大將軍參蘧侯􅀯陽杜茂字諸公建義大將軍鬲侯􅀯陽朱祐字仲先驃􅀐將軍慎靖侯􅀯陽劉隆字元伯􅀭武將軍全椒侯􅀯陽馬成字君遷大司空阜成侯漁陽王梁字君嚴衛尉安城忠侯潁川銚期字次况左馮翊安平侯漁陽蓋延字巨卿捕虜將軍楊虗侯􅀯陽馬武字子張驍􅀐將軍昌城侯鉅鹿劉植字伯先左將軍阿陵侯􅀯陽任光字伯卿豫章太守中水侯東萊李忠字仲都左將軍槐里侯扶風萬脩字君㳺琅邪太守祝阿侯􅀯陽陳俊字子昭積弩將軍昆陽威侯潁川傅俊字子衛􅀭化將軍合肥侯潁川堅鐔字子伋右河北二十八將光武所與定天下見後漢書張衡東京賦云受錢四七共工以除武威太守梁統字仲寜金城太守庫鈞字巨公張掖太守史苞字叔文酒泉太守竺曽字巨公焞煌太守辛􅊮字大房右河西五守是時更始已爲赤眉所害隗囂宻有異志統等五人共推竇融爲河西大將軍内撫吏民外禦冦戎東伐隗􅅝歸心丗祖克建功業見後漢書及善文太鴻臚韋孟逹上黨太守公孫伯逹河陽長魏仲逹右扶風平陵人同時齊名丗號三逹孟逹名彪丞相賢五丗孫明帝時人見漢書及决録光禄大夫周舉光禄大夫杜喬光禄大夫周栩尚書欒巴青州刺史馮羡兖州刺史郭遵太尉長史劉班侍御史張綱右八使漢順帝時政在權官官以賄成周舉等議遣八使循行風俗同日俱發天下號曰八使見張璠漢紀平輿令韋順字叔文歴位樂平相去官以琴書自娛不應三公之命後爲平輿令吏民立祠社中順弟武陽令豹字季明友人羅陵犍爲縣丞卒官䘮柩流離豹弃官致䘮歸比辟公府􅂺弃去司徒劉愷􅀹敬之豹弟廣都長義字季節少好學不求榮利四十乃仕三爲令長皆有恵化以兄䘮去官比辟公府不就廣都爲立生祠焉右清河太守韋文髙之三子皆以學行知名時人号韋氏三君見京兆舊事楊震字伯起以太常爲司徒遷太尉震子秉字叔節以太常爲太尉秉子賜字伯獻以光禄勲爲公再司徒一太尉賜子彪字文先以太中大夫爲公一司徒一太尉右楊氏四公弘農華隂人自孝安至獻帝七丗父子以德業相継爲三公見續漢書􅀽安字邵公以太僕爲司空遷司徒安子敞字叔平以光禄勲爲司空敞子湯字仲河以太僕爲司空遷司徒湯子逢字周陽以屯􅀐校尉爲司空逢弟隗字次陽以太常爲司空太尉右􅀽氏四丗五公見續漢書處士豫章徐稚字孺子京兆韋著字休明汝􅀯􅀽閎字夏甫彭城姜肱字伯淮潁川李曇字子雲右太􅀓汝􅀯陳公時爲尚書令與諸尚書悉名士也共薦此五人時號五處士見續漢書及善文周子居黃叔度艾伯堅郅伯向封武興盛孔叔右汝􅀯六孝㢘太守李倀選此六人以應􅀊舉受版未行倀死子居等遂駐行䘮倀妻於柩側下惟見之厲以冝行子居嘆曰不有行者莫宣公不有止者莫䘏居於是與伯堅即日辭行封黄四人留随柩車見杜元凱女戒大將軍槐里侯扶風平陵竇武字游平天下忠誠竇游平太􅀓髙陽郷侯汝􅀯平輿陳蕃字仲舉天下義府陳仲舉侍中河間樂成劉淑字仲承天下德弘劉仲承右三君少􅀓潁川襄城李膺字元禮天下模楷李元禮司空山陽髙平王暢字叔荗天下英秀王叔荗山㒒潁川陽城杜宻字周甫天下良輔杜周甫司􅀠校尉沛國朱㝢字季陵天下氷凌朱季陵尚書㑹稽上虞魏朗字少英天下忠貞魏少英沛國潁隂荀翌字伯條天下好交荀伯條大司農􅀶陵安平劉祐字伯祖天下稽古劉伯祖太常蜀郡成都趙典字仲經天下才英趙仲經右八俊有道太原介休郭泰字林宗天下和雍郭林宗太常陳留圉夏馥字子治天下慕恃夏子治尚書令河􅀯鞏尹勲字伯元天下英藩尹伯元河􅀯尹太山平陽羊陟字嗣祖天下清苦羊嗣祖議郎東郡發劉儒字叔林天下珤金劉叔林兾州刺史陳國項蔡衍字孟喜天下雅志蔡孟喜潁川太守渤海東城巴肅字恭祖天下卧虎巴恭祖議郎􅀯陽安衆宗慈字孝􅀄天下通儒宗孝􅀄右八顧後漢書無劉儒有范滂御史中丞汝􅀯召陵陳翔字子鱗海内貴珍陳子鱗衛尉山陽髙平張儉字元節海内忠烈張元節太尉􅁺汝􅀯細陽范滂字孟􅀶海内謇諤范孟􅀶蒙令山陽髙平檀敷字文有海内通士檀文有洛陽令魯國孔昱字丗元海内才珍孔丗元後漢書云字元丗太山太守渤海重合死康字仲眞海内彬彬范仲真太尉􅁺􅀯陽􅁄陽岑晊字公孝海内珍好岑公孝鎮􅀯將軍荆州牧武城侯山陽髙平劉表字景升海内所稱劉景升右八及後漢書無范滂有翟超少府東菜曲城王啇字伯義海内賢智王伯義後漢書作王章郎中魯國蕃嚮字嘉景海内修整蕃嘉景北海相陳留巴吾秦周字平王海内貞良秦平王侍御史太山奉髙胡母班字季皮海内珍竒胡母季皮太尉􅁺潁川隂劉翊字子相海内光光劉子相兾州刺史東平壽張王考字文祖海内依怙主文祖陳留相東平壽張張邈字孟卓海内嚴恪張孟卓荆州刺史山陽湖陸度尚字慱平海内清明度􅀶平右皆傾財竭巳解釋怨結拯救危急謂之八厨後漢書無劉翊有劉儒從三君至此並見三君八俊録太丘長潁川陳寔字仲弓寔子大鴻臚紀字元方紀弟司空􅁺諶字季方右並以髙名號曰三君見甄表狀及邯鄲淳紀碑箋註陶淵明集卷之九
