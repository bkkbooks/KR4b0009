front:
  text: 箋註陶淵明集卷之四
  hash: sha256:912f42846cb434adb203ff939269fae949b4ea701fec93edf2ec3d40d6f85aec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_004-1a}
body:
  text: 詩五言擬古九首其一榮榮牎下蘭宻宻堂前柳􅀄與君别時不謂行當乆出門萬里客中道逢嘉友未言心相醉不在接杯酒蘭枯柳亦衰遂令此言􅀒多謝諸少年相知不忠厚意氣傾人命離隔復何有其二辭家夙􅃊駕當徃志無終問君今何行非啇復非戒聞有田子春節義爲士雄斯人乆已死郷里習其風生有髙世名旣没傳無窮不學狂馳子直在百年中田疇字子春漢北平無終人時董卓迁帝于長安幽州牧劉虞欲遣使奔問行在無其人聞疇竒士乃署爲從事疇將行道路阻絶遂循間道至長安致命詔拜騎都尉疇以天子蒙塵不可荷㑉榮寵固辝不受得報還虞巳爲公孫瓚所㓕疇謁虞墓􅂘泣而去瓉怒曰汝何不送章報於我疇荅曰云云瓚壯之疇得此歸遂入徐無山中其三仲春遘時雨始雷發東隅衆蟄各潜駭草木從横舒翩翩新來燕雙􅀟入我廬先巢故尚在相將還舊居自從分别來門庭日荒蕪我心固匪石君情定何如其四迢迢百尺樓分明望四荒暮作歸雲宅朝爲飛鳥堂山河滿目中平原獨茫茫古時功名士慷􅁣争此􅂣一旦百􅀊後相與還北邙音忙松柏爲人伐髙墳互低昻頺基無遺主遊魂在何方榮華誠足貴亦復可憐傷其五東方有一士􅀍服常不完三旬九遇食􅀃􅁐子思三旬九食十年著一冠辛苦無此比常有好容顔我欲觀其人晨去越河關青松來路生白雲􅀫簷端知我故來意取琴爲我彈上絃驚别鶴下絃操􅀌鸞願留就君住從今至􅀊寒其六蒼蒼谷中樹冬夏常如兹年年見霜雪誰謂不知時厭聞世上語結友到臨淄稷下多談士􅃌彼决吾疑裝束旣有日巳與家人辭行行停出門還坐更自思不怨道里長但畏人我欺萬一不合意永爲世􅀏之伊懷難具道爲君作此詩湯東澗曰前四句興而比以言吾有定見而不爲談者所眩似謂白蓮社中人也其七目暮天無雲春風扇微和佳人美清夜逹􅍼酣且歌􅍼東方明歌竟長歎息持此感人多皎皎雲間月灼灼葉中華豈無一時好不乆當如何其八少時壯且厲撫劒獨行游誰言行遊近張掖至幽州飢食首陽薇渇飲易水流荆軻爲燕太子丹刺秦王太子及賓客皆送至易水之上不見相知人惟見古時丘路邊两髙墳伯牙與莊周此士難再得吾行欲何求東澗曰首陽易水亦寓憤世之意􅀃􅁐鍾子期死而伯牙絶絃破琴知丗莫可爲鼓也惠施卒而莊子􅀷暝不言見世莫可語也伯牙之琴莊周之言惟鍾惠能聽今有能聽之人而無可聽之言此淵明所以罷逺遊也其九種桑長江邊三年望當採枝條始欲茂忽值山河改柯葉自摧折根株浮滄海春􅅙旣無食寒衣欲誰待本不植高原今日復何悔東澗曰業成志樹而時代遷革不復可騁然生斯時矣奚所歸悔耶雜詩十二首其一人生無根蔕飘如陌上塵分散逐風轉此巳非常身落地爲兄弟何必骨􅁏親得歡當作樂斗酒聚此隣盛年不重來一日難再晨及時當勉勵􅀊月不待人其二白日淪西河素月出東嶺遥遥萬里輝蕩蕩空中景風來入房戸夜中枕席冷氣變悟時易不眠知夕永欲言無子和揮杯勸􅀌影日月擲人去有志不􅀗騁念此懐悲悽終曉不能静其三榮華難乆居盛衰不可量昔爲三春蕖今作秋蓮房嚴霜結野草枯悴未遽央日月有環周我去不再陽眷眷徃昔時憶此断人腸湯東澗曰此篇亦感興亡之意其四丈夫志四海我願不知老親戚共一處子孫還相保觴絃肆朝日罇中酒不燥緩帶盡歡娯起晚眠常早孰若當世士冰炭滿懷抱百年歸丘壟用此空名道其五憶我少壯時無樂自欣豫猛志逸四海騫翮思逺翥荏苒􅀊月頺此心稍巳去值歡無復娯毎毎多􅁨慮氣力漸衰損轉覺日不如壑舟無須􅁷引我不得住前塗當幾許未知止泊處古人惜寸隂念此使人懼湯東澗曰太白詩云百􅀊落半塗前期浩漫漫中宵不成寐天明起長歎人生學無歸􅀫者例有此歎必聞道而後免此此淵明所以惜寸隂歟其六昔聞長者言掩耳毎不喜柰何五十年忽已親此事求我盛年􅂬男子自二十一至二十九則爲盛年一毫無復意去去轉欲逺此生豈􅂯值傾家時作樂竟此􅀊月駛有子不留金何用身後置按此詩靖節年五十作也時義熈十年甲寅􅀄廬山東林寺主釋慧逺集緇素百二十有三人於山西巖下般若臺精舎結白蓮社􅀊以春秋二節同寅恊恭朝宗靈像也及是秋七月二十八日命劉遺民撰同誓文以申嚴斯事其間譽望􅀹著爲當世推重者號社中十八賢劉遺民張詮雷次宗宗炳周續之張野等預馬時秘書丞謝靈運才學爲江左冠而􅀒才傲物少所推挹一見逺公遽改容致敬因於神殿後鑿二池植白蓮以規求入社逺公察其心􅄂拒之靈運晚節踈放不檢果不克令終中書侍郎范寗直節立朝爲權貴譛忌出守豫章逺公移書邀入社寗辭不至蓋未能頓委世縁也靖節與逺公雅素寕爲方外交而不願齒社列逺公遂作詩􅀶酒鄭重招致竟不可詘按梁僧慧皎髙僧傳逺公持律精苦雖䜴酒米汁及􅁡水之㣲且誓死不犯乃欽靖節風槩顧我能致之者力爲之不睱䘏靖節反麾而謝之或與樵􅂫田父班荆道舊于何庸流能窺其趣哉靖節毎來社中一日謁逺公甫及寺外聞鍾聲不覺顰容遽命還駕法眼禪師晚參示衆云今夜鍾鳴復來有何事若是陶淵明攅眉􅁍廻去此靖節洞明心要惟法眼特爲揄揚張啇英有詩云虎溪回首去陶令趣何􅀷謝無逸詩云淵明從逺公了此一大事下視區中賢略不可人意逺公居山餘三十年影不出山蹟不入俗送􅩏游履常以虎溪爲界他日偕靖節簡寂禅觀主陸脩静語道不覺過虎溪數百歩虎輙驟鳴因相與大􅀏而别石恪遂作三􅀏圗東坡賛之李伯時蓮社圗李元中紀之足標一時之風致云其七日月不肯遲四時相催迫寒風拂枯條落葉掩長陌弱質與運頺玄鬢早已白靖節早年髮白素標挿人頭前塗漸就窄家爲逆旅舎我如當去客去去欲何之􅀯山有舊宅其八代耕本非望所業在田桑躬親未曾替寒餒常糟糠豈期過滿腹但願飽粳糧御冬足大布麄絺以應陽正爾不能得山谷云正爾不能得乃當時語改作止甚失語法哀哉亦可傷人皆盡􅀗冝拙生失其方理也可柰何且爲陶一觴其九遥遥從覉役一心處两端掩淚汎東逝順流追時遷日没星與昴􅀔翳西山巔蕭條隔天涯惆悵念常飡慷􅁣思􅀯歸路遐無由縁􅀜梁難􅃜替絶音􅀉斯篇其十閑居執蕩志時駚不可稽驅役無停息軒裳逝東崖沉隂擬薰麝寒氣激我懷􅀊月有常御我來淹已彌慷􅁣憶綢繆此情乆已離荏苒經十載暫爲人所羇庭宇翳餘木倐忽日月􅃜其十一我行未云逺回顧慘風凉春燕應節起髙飛拂塵梁邊鴈悲無所代謝歸北郷離鵾鳴清池渉暑經秋霜愁人難爲辭遥遥春夜長其十二嫋嫋松標崖婉變柔童子年始三五間喬柯何可􅀝養色含津氣粲然有心理東坡和陶無此篇詠貧士七首其一萬族各有託􅀌雲獨無依曖曖空中㓕何時見餘暉朝霞開􅀫霧衆鳥相與飛遟遟出林翮未夕復來歸量力守故轍豈不寒與􅏇知音苟不存巳矣何所悲湯東澗曰􅀌雲倦翮以興舉世皆依乗風雲而巳獨無攀援飛飜之志寕忍飢寒以守志節縱無知此意者亦不足悲也其二凄厲􅀊云暮擁􅄄曝前軒􅀯圃無遺秀枯條􅄹北園傾壷絶餘􅄋闚竈不見煙詩書塞座外日昃不遑研閑居非陳厄􅀼有愠見言何以慰吾懐頼古多此賢其三榮叟老帶索欣然方彈琴見飲酒註原生納決屨清歌暢髙音原憲重華去我乆貧士世相㝷弊􅁭不掩肘藜羮常乏斟豈忘襲輕裘苟得非所欽賜也徒能辯乃不見吾心其四安貧守賤者自古有黔婁劉向列女傳魯黔娄妻者魯黔婁先生之妻也先生死曽子哭之畢曰何以爲謚其妻曰以康爲謚曽子曰先生在時食不充曰衣不盖形死則手足不歛何楽於此而謚爲康寕其妻曰昔先生君嘗欲投之政以爲囯相辝而不受是有餘貴也君嘗賜之粟三十鍾辝而不受是有餘冨也彼先生者􅅴天下之淡味安天下之卑位不戚戚於貧賤不忻忻於冨貴求仁得仁求義得義其謚曰康不亦冝乎好爵吾不榮厚饋吾不酬一旦壽命盡弊服仍不周豈不知其極非道故無􅁨從來將千載未復見斯儔朝與仁義生夕死復何求其五􅀽安困積雪邈然不可干晉書洛陽大雪文餘縣令出見􅀽安門無行迹謂其巳死入見安偃卧問其故荅曰大雪人乏食不冝干人令䝨之舉孝廉阮公見錢入即日棄其官芻藁有常温採莒足朝飡豈不實辛苦所懼非飢寒貧冨常交戰道勝無戚顔至德冠􅀖閭清節映西􅀜其六仲蔚愛窮居遶宅生蒿蓬翳然絶交游賦詩頗能工舉丗無知者止有一劉龔張仲蔚善屬文好詩賦常居窮素所處逢蒿没人閉門飬性時人莫知惟劉龔知之此士胡獨然寔由罕所同介焉安其業所樂非窮通莊子古之得道者窮亦楽通亦楽所楽非窮通也人事固以拙聊得長相從其七昔在黄子廉黄蓋傳云􅀯陽大守黃子廉之後也彈冠佐名州一朝辭吏歸清貧略難儔年飢感仁妻泣涕向我流丈夫雖有志固爲兒女􅁨惠孫一晤歎腆贈竟莫酬誰云固窮難邈哉此前脩詠二踈漢踈廣傳廣字仲翁爲太子太傅兄子受爲太子少傅在位五􅀊廣謂受曰知足不辱知止不殆今仕䆠至二千石名立如此不去懼有後悔豈如父子相隨出􅀜歸老故郷不亦善乎即日上䟽乞骸骨宣帝許之公卿大夫故人邑子設祖道供帳東都門外送者車數百兩觀者皆曰賢哉二大夫廣歸郷里日具酒食故舊賓客與相娯樂大象轉四時功成者自去蔡澤云四時之序功成者去借問衰周來幾人得其趣游目漢廷中二踈復此舉髙嘯返舊居長揖儲君傳餞送傾皇朝華軒􅄹道路離别情所悲餘榮何足顧事勝感行人賢哉豈常譽厭厭閭里􅂬所營非近務促席延故老揮觴道平素問金終􅀉心清言曉未悟放意樂餘年遑恤身後慮誰云其人亡乆而道彌著東坡曰詠二踈詩淵明未嘗出二踈旣出而知返其志一也或以謂旣出而返如從病得愈其味勝於􅀄不病此惑者顚倒見耳東澗曰二踈取其歸三良與主同死荆卿爲主報􅄷皆託古以自見云詠三良三良子車氏子奄息仲行鍼虎穆公殁康公從治命以三子爲殉國人哀之賦黄鳥彈冠乗通津但懼時我遺服勤盡􅀊月常恐功愈微忠情謬􅀗露遂爲君所私出則陪文與入必侍丹帷箴規嚮巳從計議􅀄無􅃜一朝長逝後願言同此歸厚恩因難忘君命安可違臨穴罔惟疑投義志攸希荆􅁄籠髙墳黄鳥聲正悲良人不可贖玆然沾我衣􅁑常之曰三良以身殉秦穆之葬黄鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦穆不在三良矣王仲宣云結髮事明君受恩良不訾臨没要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死爲非也至李德􅁉則謂社禝死則死之不可許之死欲與梁丘據安陵君同譏則是罪三良之死非其所矣然君命之於前衆驅之於後爲三良者雖欲不死得乎惟柳子厚云疾病命固亂魏氏言有章從邪䧟厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至䧟父於不義如此哉東坡和陶亦云顧命有治乱臣子得從違魏顆真孝愛三良安足希似與柳子之論合審如是則三良不能無罪然坡公過秦穆墓詩乃云穆公生不誅孟明豈有死之日而忍用其良乃知三子徇公意亦如齊之二子從田横則又言三良之殉非穆公之意也詠荆軻燕丹善養士志在報強䇔招集百夫良􅀊暮得荆卿君子死知己提劒出燕京素􅂹鳴廣陌慷􅁣送我行雄髮􅃌危冠猛氣充長纓飲餞易水上四座列群英漸離擊悲筑宋意唱髙聲淮􅀯子髙漸離宋意爲擊筑而歌於易水之上蕭蕭哀風逝淡淡寒波生啇音更流涕羽奏壯士驚心知去不歸且有後世名登軍何時顧飛盖入秦庭凌厲越萬里逶迤過千城圗窮事自至豪主正怔營惜哉劔術踈魯勾踐聞荆軻之刺秦王曰惜哉其不講於刺劒之術也竒功遂不成其人雖已没千載有餘情朱文公曰淵明詩人皆說平談看他自豪放得來不覺其露出本相者是詠荆軻一篇平談底人如何􅀃得這様言語出來讀山海經十三首按讀山海經穆天子傳止題讀山海其一孟夏草木長遶屋樹扶踈衆鳥欣有托吾亦愛吾廬旣耕亦已種時還讀我書窮巷隔深轍頗􅅆故人車歡然酌春酒摘我園中􅂼微雨從東來好風與之俱汎覧周王傳周穆天子傳者大康二年汲縣民發古塚所􅀗書也流􅀚山海圖俯仰終宇宙不樂復何如其二玉臺凌霞秀王母怡妙顔天地共俱生不知幾何年靈化無窮已館宇非一山髙酣發新謡寕效俗中言山海經云玉山王母所居又云處崑崙之丘郭璞註云王母亦自有離宫别舘不專住一山也穆天子傳西王母宴穆王於瑶池之上爲天子謡曰云云其三迢遞槐江嶺是謂玄圃丘西南望崑墟光氣難與儔亭亭明玕照落落清瑶流恨不及周穆託乗一來游山海經云槐江之山其上多琅玕實惟帝之平圃􅀯望崑崙其光熊熊其氣魂魂爰有淫流其清洛洛平圃即玄圃滛流上音遥穆傳天子銘跡於玄圃之上其四丹木生何許廼在峚音宻山陽黄花復朱實食之壽命長白玉凝素液瑾瑜發竒光豈伊君子寳見重我軒黄山海經云峚山上多丹木黄華而赤實食之不飢丹水出焉其中多白玉是有王膏黄帝是食是饗瑾瑜之玉爲良濁澤而有光君子服之以禦不祥其五翩翩三青鳥毛色竒可憐朝爲王母使暮歸三危山我欲因此鳥具向王母言在丗無所須惟酒與長年山海經云三青鳥主爲西王母􅂑食又曰三危之山三青鳥居之其六逍遥蕪臯上杳然望扶木洪柯百萬㝷森散覆􅊙谷靈人侍丹池朝朝爲日浴神景一登天何幽不見燭山海經云大荒之中有山上有扶木柱三百里有谷曰􅊙谷上有扶木註云扶桑在上其七粲粲三珠樹􅀉生赤水隂亭亭凌風桂八榦共成林靈鳯撫雲舞神鸞調玉音雖非世上寳爰得王母心山海經云三珠樹生赤水上其樹如柏葉皆爲珠桂林八樹在畨隅東八樹而成林言其大也臷民之國爰有歌舞之鳥鸞鳥自歌鳯鳥自舞其八自古皆有没何人得靈長不死復不老萬歳如平常赤泉給我飲貟丘足我糧方與三辰游壽考豈渠央山海經云不死民在交脛國東其人黒色壽不死其九夸父誕宏志乃與日競走俱至虞淵下似􅀂無勝􅀒神力旣殊妙傾河焉足有餘迹􅀉鄧林功竟在身後山海經云夸父不量力欲追日景逮之於禺谷渇欲得飲飲於河渭河渭不足北飲大澤未至道渇而死棄其杖化爲鄧林注夸父者神人之名也其能及日景而傾河渭豈以走飲哉其十精衛衘微木將以塡滄海刑天舞干戚猛志故常在同物旣無慮化去不復悔徒設在昔心良晨詎可待山海經云精衛炎帝之少女名曰女娃游于東海溺而不反故爲精衛常衘西山之木石以堙東海曽紘曰余嘗評陶公詩語造平淡而寓意深逺外若枯槁中實敷􅃾真詩人之冠冕也平生酷爱此作毎以丗無善本爲恨因山海經詩云形夭無千􅀊猛志固常在疑上下文義不相貫遂取山海經參校經中有云刑天獸名也口中好衘干戚而舞乃知此句是刑天舞干戚故與猛志固常在相應五字皆訛盖字畫相近無足怪者因思宋宣献言校書如拂几上塵旋拂旋生豈欺我哉其十一巨猾肆威􅁀欽駓違帝旨窫窳上音軋下音愈強能變祖江遂獨死明明上天鍳爲惡不可履長枯固已劇鵕鶚豈足恃山海經云鐘山神其子曰鼓是與欽䲹丕殺祖江于崑崙之陽帝乃戮之欽䲹化爲大鶚鼔亦化爲鵕鳥見即其邑大旱窫窳龍首居弱水中注云本蛇身人靣爲貳􅀒臣所殺復化而成此物其十二鵃鵝當作䲭鴸見城邑其國有放士念彼懐王世當時數來止青丘有竒鳥自言獨見爾本爲迷者生不以喻君子山海經云柜山有鳥其狀如鴟其名曰鴸音株見則其縣多放士注放逐也青丘之山有鳥狀如鳩其十三巖巖􅂋朝市帝者慎用才何以廢共鯀重華爲之來仲父獻誠言姜公乃見猜臨􅃿告飢渇當復何及哉擬挽歌辭三首其一有生必有死早終非命促昨暮同爲人今旦在􅀑録魂氣散何之枯形􅀉空木嬌兒索父啼良友撫我哭得失不復知是非安能覺千秋萬􅀊後誰知榮與辱但恨在世時飲酒不得足其二在昔無酒飲今但湛空觴春醪生浮蟻何時更能嘗肴案􅄹我前親舊哭我傍欲語口無音欲視眼無光昔在髙堂寢今􅀫荒草郷一夲有荒草無人眠極視正茫茫二句一朝出門去歸來良未央其三荒草何茫茫白楊亦蕭蕭嚴霜九月中送我出逺郊四靣無人居髙墳正嶣嶤馬爲仰天鳴風爲自蕭條幽室一巳閉千年不復朝千年不復朝賢逹無柰何向來相送人各自還其家親戚或餘悲他人亦已歌死去何所道託體同山阿祁寛曰昔人自作􅀕文挽詩者多矣或寓意騁辭成於暇日寛攷㳊靖節詩文乃絶筆於􅀕挽二篇盖出於属纊之際者辭情俱逹尤爲精麗其於晝夜之道了然如此古之聖賢唯孔子曽子能之見於曵杖之歌易簀之言嗟哉斯人没七百年未聞有􅁛賛及此者因表而出之附于卷末趙泉山曰嚴霜九月中送我出逺郊與自􅀕文律中無射之月相符知挽辭乃將逝之夕作是以梁昭明采此辭入選止題曰陶淵明挽歌而編次本集者不悟乃題云擬挽歌辭曽端伯曰秦少游將亡效淵明自作哀挽王平甫亦云九月清霜送陶令此則挽辭决非擬作從可知矣又曰晋􅁊伊善挽歌􅁃晞亦喜爲挽歌毎自摇大鈴爲唱使左右齊和􅀽山松遇出遊則好令左右作挽歌􅀋皆一時名流逹士習尚如此非如今之人例以爲悼亡之語而􅁖言之也按􅂫劉皆不和豈畏死耶聮句鳴鴈乗風飛去去當何極念彼窮居士如何不嘆息淵明雖欲騰九萬扶摇竟何力逺招王子喬雲駕庶可飭愔之顧侣正徘徊離離翔天側霜露豈不切務從忘愛翼循之髙柯濯條幹逺眺同天色思絶慶未看徒使生迷惑箋註陶淵明集卷之四
