front:
  text: 箋注陶淵明集卷之十
  hash: sha256:d5f7431d4d3fc05992885b0ecd23b4218f192052df80f6a541385abea79f8c70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_010-1a}
body:
  text: 集聖賢羣輔録下太尉河南杜喬字叔榮狀喬治易尚書禮記春秋晚好老子隱居不仕年四十為郡工曺立朝正色有孔父之風太常燉煌張奐字然明狀奐廉方亮直學該群籍前後七徴十要三為邊將財貨珍寶一無所取矯王孫祼形宋司馬為石享幅巾時服無棺而葬焉侍中河內向詡字甫興狀詡博覽群籍兼好黃老古虛泊然肆志不慕時倫積三十年太傳汝南陳蕃字仲舉狀蕃壞偉秀出稚亮二倫學該墳典忠壯蹇諤又曰明允貞亮與大將軍竇武志匡社稷機事不密為羣邪所害太尉沛國施延字君子狀延清公潔白進士許國臨難不顧名著漢朝少府潁川李膺字元禮狀膺承三公之後生髙潔之門少履清節非法不言英聲宣於華夏髙名冠於搢紳司隸沛國朱宇字季陵一名詡右一人訪其中正無識知行狀者告本郡訪問耆老識宇云桓帝時遭難無後太僕潁川杜密字周甫狀密清髙雅逹名播四海歷統五郡恩惠化民大鴻臚潁川韓融字尤長狀融聰識知機發於岐嶷時人名之曰窮神知化兄弟同居至於沒齒處卿相之位且二十年奉身守約不隕厥問司空潁川荀爽字慈明狀爽年十二隨父在公府羣公卿校咸丈人也或遣進奏或親候從儒林歸伏究極篇籍司空清河房植字伯武狀植少履清苦孝友忠正歷位州郡政成化行既登三事靖恭衮暇雖季文相魯晏嬰在齊清風髙節不是過也聘士彭城薑肱字伯淮狀肱稟履玄知立性純固事親至孝五十而慕學綜六藝窮通究微行隆華夏名播四海太尉下邳陳球字伯真狀球清髙忠直孝靈中年欲誅黃門常侍以此遇害司空山陽王暢字叔茂狀暢雅性貞實以禮文身居家在朝節行異倫徴士陳留申屠蟠字子龍狀蟠年九歲喪父號泣過於成人未嘗見齒每至父母亡日三日不食在冢側致甘露白雉以孝稱州郡表其門閭徴聘不就年七十二終於家衛尉山陽張儉字元節狀儉體性忠直閨門孝友臨官賞罰清亮絶俗大司農北海鄭玄字康成狀玄含海岱之純靈躰大雅之洪則學無常師講求道奧敷宣聖範錯綜其數作五經注義窮理盡性也徴士樂安冉璆字孟玉狀璆體清純之性蹈髙潔之行前後十五辟皆不就除髙唐令色斯而舉時陳仲舉李元禮仲弓皆難其髙風太尉漢中李固字子堅狀固當順桓之際號稱名臣大將軍梁兾惡直醜正害其道桓帝即位遂死於讒有道太原郭泰字林宗狀泰器量弘深孝友貞固名布華夏學冠群儒州郡禮命曽不旋軌辟司徙徴有道並不屈益州刺史南陽朱穆字公叔狀穆中正嚴恪有才數明見𥘉輔豐令政平民和有虙子賤之風上書陳損益辝切情至尚書會稽魏朗字少英狀朗資純美之髙亮幹輔國朝忠蹇正直之節播於京師聘士豫章徐稚字孺子狀稚妙德髙偉清英超丗前後三徴未嘗降志抗名山棲飬志浩然有夷齊之髙蘧伯玉卷舒之術度遼將軍安㝎皇甫規字威明狀規少有岐嶷正直之節對䇿指刺黃門梁兾不能用退隱山谷敦樂詩書右魏文帝𥘉為丞相魏王所旌表二十四賢後明帝乃𫐠撰其狀見文帝令及甄表狀太常燉煌張奐字然明為度遼將軍幽并清靜吏民歌之徴拜大司農賜錢除家一人為郎辭不受願徙居華隂故始為弘農人度遼將軍安定皇甫規字威明太尉武威假熲字紀明右涼州三明並著威名於桓靈之丗悉名士也見續漢書韋權字孔衡弟瓉字孔玉瓉弟矩字孔規右太尉掾韋子才之三子皆修仁義兄弟孝友逢盜賊一人病不能去兄弟相慕兵至俱死時人稱之號韋三義見三輔決録荀儉字伯慈漢侍中恱之父儉弟緄字仲慈濟南相漢光祿大夫或之父年六十六緄弟靖字叔慈或問汝南許劭靖爽孰賢邵曰二人皆玉也慈明外朗叔慈內潤靖隱身修學動必以禮太尉辟不就年五十五靖弟壽字慈光舉孝廉年七十壽弟汪字孟慈昆陽令年六十汪弟爽字慈明公車徴為平原相遷光祿勳司空出自巖藪九十三日遂登台司年六十三爽弟肅字敬慈守舞陽令年五十肅弟敷字幼慈司徒掾年七十右朗陵令潁川荀季和之八子並有德業時人號之八龍居西豪里勃海宛康知名士也時為潁隂令美之曰髙陽氏才子八人遂改所居為髙陽里見張璠漢紀及荀氏譜公沙紹字子起紹弟孚字允慈北海耆舊傳稱浮與荀爽共約出不得事貴勢而爽當董卓時脫巾未百日位至司空後相見以爽違約割席而坐孚弟恪字允讓恪弟逵字義則逵弟樊字義起右北海公沙穆之五子並有令名京師號曰公沙五龍天下無雙穆亦名士也見魏明帝甄表狀及後漢書膠東令盧汜昭字興先樂城令剛戴祈字子陵潁隂令剛徐晏字孟平涇令盧夏隱字叔丗州别駕蛇丘劉彬字文曜一云丗州右濟北五龍少並有異才皆稱神童當桓靈之丗時人號為五龍見濟北英賢傳孝廉杜陵金敞字元休位至兖州刺史上計掾長陵弟五巡字文休興先之子興先名種司空伯魚之孫名士也不詳巡位所至時辟太尉掾上計掾杜陵韋端字甫休位至涼州牧太尉右同郡齊名時人號之京兆三休並以光和元年察舉見三輔決録晉宣帝河南司馬懿字仲逹魏司空潁川陳群字長文中領軍譙朱鑠字彥才侍中濟隂吳質字季重右魏文帝四友見晉紀魏步兵校尉陳留阮籍字嗣宗中散大夫譙嵆康字叔夜晉司徒河內山濤字巨源建威參軍沛劉伶字伯倫始平太守陳留阮咸字仲容籍兄子散騎常侍河內向秀字子期司徒琅邪王戎字濬沖右魏嘉平中並居河內山陽共為竹林之遊丗號竹林七賢見晉書魏書袁宏戴逵為傳孫統又為讃吳範相風吳人劉惇占氣河內人趙逹算河內人皇象書廣陵人嚴子卿棊名昭武衛尉畯從子宋壽占夢十不失一曺不興晝為孫權畫屏風筆墨悮點因以為蠅後張御坐權以為真蠅手彈不去方知其非也孤城鄭姥相見王粲於童賤謂仕必主師傳後為太子太傳右吳八絶見張勃吳録陳留董昶字仲道琅琊王澄字平子陳留阮瞻字千里一云阮八百即瞻弟孚字遙集朗率多通故大將軍王敦云方瞻有減故云八百潁川庚凱字子嵩陳留謝鯤字幼輿太山胡母輔之字彥國沙門于法龍樂安光逸字孟祖右晉中朝八逹近丗聞之故老裴徽字文秀魏兾州刺史裴楷字叔則徽弟三子晉光祿大夫裴綽字季舒楷弟長水校尉裴瓉字國寶楷子中書郎裴邈字景𥘉楷孫欽子太傳左司馬裴遐字叔道瓉子太傳主簿裴康字仲豫徽弟二子太子左率裴頠字逸民揩孫季子晉尚書㒒射王祥字休徴晉太保王戎字濬沖父渾涼州刺史祥族子司徒王澄字平子衍弟裴綽女壻荆州刺史王導字茂弘覽孫裁子敦從弟丞相王綏字萬子戎子早亡裴康女壻王衍字夷甫父又平北將軍戎從弟太尉王敦字處仲覽孫基弟二子大將軍王玄字眉子衍子陳留內史右河東八裴琅邪八王聞之於故老魏司空王昶字文舒昶子汝南太守湛字處沖湛子東海內史承字安期承子驃騎將軍𫐠字懷祖𫐠子安北將軍坦之字文度魏尚書㒒射杜畿字伯侯畿子幽州刺史恕字務伯恕子鎮南將軍預字元凱預子散騎常侍錫字丗嘏錫子光祿大夫又字弘治右太原王京兆杜各稱五丗盛德聞之於故老凡書籍所載及故老所傳善惡聞於丗者蓋盡於此矣漢稱田叔孟舒等十人及田橫兩客魯八儒史並失其名夫操行之難而姓名翳然所以撫卷長嘆不能巳巳者也八儒二子沒後散於天下設於中國成百氏之源為綱紀之儒居環堵之室蓽門圭竇甕牖繩樞併日而食以道自居者有道之儒子思氏之所行也衣冠中動作順大讓如慢􅘁讓如偽者子張氏之所行也顔氏傳詩為道為諷諌之儒孟氏傳書為道為踈通致逺之儒漆雕氏傳禮為道為恭儉莊敬之儒仲梁氏傳樂為道以和隂陽為移風易俗之儒樂正氏傳春秋為道為屬辭比事之儒公孫氏傳易為道為潔淨精微之儒三墨不纍於俗不飾於物不尊於名不忮於衆此宋鉶尹文之墨裘褐為衣跂蹻為服日夜不休以自苦為極者相里勤五侯子之墨俱稱經而背譎不同相謂别墨以堅白此苦獲巳齒鄧陵子之墨靖節徴士誄宋金紫光祿大夫贈特進顔延年夫璿玉致美不為池湟之寶桂椒信芳而非園林之實豈其樂深而好逺哉蓋云殊性而巳故無足而至者物之藉也隨踵而立者人之薄也若乃巢由之抗行夷皓之峻節故巳父老堯禹錙銖周漢而綿丗寖逺光靈不屬至使菁華隱沒芳流歇絶不亦惜乎雖今之作者人自為量而首路同塵輟塗殊軌者多矣豈所以昭末景汛餘波乎有晉徴士潯陽陶淵明南嶽之幽居者也弱不好弄長實素心學非稱師文取指逹在衆不失其寡處言每見其默少而貧苦一病作居無僕妾井臼弗任藜菽不給母老子幼就飬勤匱逺惟田生致親之議追一作近悟毛子捧檄之懷𥘉辭州府三命後為彭澤令道不偶物棄官從好遂乃解體丗紛結志區外定迹深棲於是乎遂一作逺灌畦鬻𬞞為供魚菽之祭織絇緯蕭以充糧粒之費心好異書性樂酒德簡棄煩促就成省曠殆所謂國爵屏貴家人忘貧者歟有詔徴著作郎稱疾不赴春秋六十有三元嘉四年月日卒於潯陽縣之某里一作桑里柴近識悲悼逺土傷情冥默福應嗚呼淑貞夫實以誄華名由諡髙苟允德義貴賤何算焉若其寬樂令終之美好廉克巳之操有合諡典無愆前志故詢諸友好冝諡曰靖節徴士其詞曰物尚孤一作特生人固介立豈伊時遘曷云丗及嗟乎若士望古遙集韜此洪族蔑彼名級睦親之行至自非敦然諾之信重於布言廉深簡潔貞夷粹溫和而能峻博而不繁依丗尚同詭時則異有一於此而兩一作兩非默置豈若夫子因心違事一作逹理畏榮好古薄身厚志丗霸虛禮州壤推風孝惟義飬道必懷邦人之秉彛不隘不恭爵同下士祿等上農度痁疾視化如歸臨凶若吉藥劑弗嘗禱祠非恤傃幽苦終懷和長畢嗚呼哀哉敬𫐠清一作靖節式遵遺占存不願豐沒無求贍省訃却􅉠輕哀薄斂遭壤以穿旋葬而窆嗚呼哀哉深心追往逺情逐化自爾介居及我多暇伊好之洽接閻鄰舍宵盤晝憩非舟非駕念昔宴私舉觴相誨獨正者危至方則礙哲人卷舒布在前載取鑑不逺吾規子佩爾實愀然中言而發遺衆速尤忤風光蹶身才非實榮聲有歇徽一作睿音永矣誰針余闕嗚呼哀哉仁焉而終智焉而斃黔婁既沒展禽亦逝其在先生同塵往丗旌此靖節加彼康惠嗚呼哀哉傳昭明太子陶淵明字元亮或云潛字淵明潯陽柴桑人也曽祖侃晉大司馬淵明少有髙趣博學善屬文潁脫不羣任真自得嘗著五柳先生傳以自况曰先生不知何許人也亦不詳姓字宅邊有五柳樹一本無樹字因以為號焉間靜少言不慕榮利好讀書不求甚解每有會意欣然忘食性嗜酒而家貧不能恆得親舊知其如此或置酒招之造飲輒盡期在必醉既醉而退曽不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也嘗箸文章自娛頗示己志忘懷得失以此自終時人謂之實録親老家貧起為州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾江州刺史檀道濟往候之偃卧瘠餒有日矣道濟謂曰賢者處丗天下無道則隱有道則至今子生文明之丗奈何自苦如此對曰潛也何敢望賢志不及也道濟饋以梁肉麾而去之後為鎮軍建威參軍謂親朋曰聊欲弦歌以為三徑之資可乎執事者聞之以為彭澤令不以家纍自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之公田悉令吏種秫曰吾常得醉於酒足矣妻子固請種粳乃使二頃五十畒種秫五十畒種粳歲終會郡遣督郵至縣吏請曰應束帶見之淵明歎曰我豈能為五斗米折腰向鄉里小兒即日解綬去職賦歸去來徴著作郎不就江州刺史王弘欲識之不能致也淵明嘗往廬山弘命淵明故人龐通之齎酒具於半道栗里之間邀之淵明有腳疾使一門生二兒舁一作舉籃輿既至欣然便共飲酌俄頃弘至亦無忤也先是顔延之為劉抑後軍功曺在潯陽與淵明情欵後為始安郡經過潯陽日造淵明飲焉每往必酣飲致醉弘欲邀延之坐一作赴坐彌日不得延之臨去留二萬錢與淵明淵明悉遣送酒家稍就取酒嘗九月九日出宅邊菊叢中坐久之滿手把菊忽值弘送酒至即便就酌醉而歸淵明不解音律而蓄無絃琴一作無絃素琴一張每酒適輒撫弄以寄其意貴賤造之者有酒輒設淵明若先醉便語客我醉欲眠卿可去其真率如此郡將常候之值其釀熟取頭上葛巾漉酒漉畢還復著之時周續之入廬山事釋惠逺彭城劉遺民亦遁迹匡山淵明又不應徴命謂之潯陽三隱後刺史檀韶苦請續之出州與學士祖企謝景夷三人共在城北講禮加以讎校所住公廨近於馬隊是故淵明示其詩云周生𫐠孔業祖謝響然臻馬隊非講肆校書亦巳勤其妻翟氏亦能安勤苦與其同忘自以曽祖晉丗宰輔耻復屈身後代自宋髙祖王業漸隆不復肯仕元嘉四年將復徴命會卒時年六十三丗號靖節先生箋注陶淵明集卷之十
