front:
  text: 箋註陶淵明集卷之十
  hash: sha256:f9b9c699d7f5b57e54479f4229eb9781586be92d12e4d838fcbbbca81902d67e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_010-1a}
body:
  text: 集聖賢羣輔録下太尉河南杜喬字叔榮狀喬治易尚書礼記春秋晚好老子隠居不仕年四十爲郡工曺立朝正色有孔父之風太常燉煌張奐字然明狀奐㢘方亮直學該群籍前後七徴十要三爲邊將財貨珍寳一無所取矯王孫祼形宋司馬爲石享幅巾時服無棺而葬焉侍中河内向詡字甫興狀詡博覧群籍兼好黄老古虚泊然肆志不慕時倫積三十年太傳汝南陳蕃字仲舉狀蕃壊偉秀出稚亮二倫學該墳典忠壯蹇諤又曰明允貞亮與大將軍竇武志匡社稷機事不宻爲羣邪所害太尉沛國施延字君子狀延清公絜白進士許國臨難不顧名著漢朝少府潁川李膺字元禮狀膺承三公之後生髙絜之門少履清節非法不言英聲宣於華夏髙名冠於搢紳司隷沛國朱㝢字季陵一名詡右一人訪其中正無識知行狀者告本郡訪問耆老識㝢云桓帝時遭難無後太僕潁川杜宻字周甫狀宻清髙雅逹名播四海歴統五郡恩恵化民大鴻臚潁川韓融字尤長狀融聦識知機發於岐嶷時人名之曰窮神知化兄弟同居至於没齒處卿相之位且二十年奉身守約不隕厥問司空潁川荀爽字慈明狀爽年十二随父在公府羣公卿校咸丈人也或遣進奏或親候從儒林歸伏究極篇籍司空清河房植字伯武狀植少履清苦孝友忠正歴位州郡政成化行旣登三事靖恭衮暇雖季文相魯晏嬰在齊清風髙節不是過也聘士彭城姜肱字伯淮狀肱禀履玄知立性純固事親至孝五十而慕學綜六藝窮通究微行隆華夏名播四海太尉下邳陳球字伯真狀球清髙忠直孝靈中年欲誅黄門常侍以此遇害司空山陽王暢字叔茂狀暢雅性貞實以禮文身居家在朝節行異倫徴士陳留申屠蟠字子龍狀蟠年九歲丧父號泣過於成人未甞見齒每至父母亡日三日不食在塚側致甘露白雉以孝稱州郡表其門閭徴聘不就年七十二終於家衛尉山陽張儉字元節狀儉軆性忠直閨門孝友臨官賞罰清亮絶俗大司農北海鄭玄字康成狀玄含海岱之純靈躰大雅之洪則學無常師講求道奥敷宣聖範錯綜其數作五經注義窮理盡性也徴士樂安冉璆字孟玉狀璆体清純之性蹈髙絜之行前後十五辟皆不就除髙唐令色斯而舉時陳仲舉李元礼仲弓皆難其髙風太尉漢中李固字子堅狀固當順桓之際号稱名臣大將軍梁兾惡直醜正害其道桓帝即位遂死於䜛有道太原郭泰字林宗狀泰噐量弘深孝友貞固名布華夏學冠群儒州郡禮命曽不旋軌辟司徙徴有道並不屈益州刺史南陽朱穆字公叔狀穆中正嚴恪有才數明見𥘉𥙷豊令政平民和有虙子賤之風上書陳損益辝切情至尚書㑹稽魏朗字少英狀朗資純羙之髙亮幹輔國朝忠蹇正直之節播於京師聘士豫章徐稚字孺子狀稚妙德髙偉清英超丗前後三徴未甞降志抗名山棲飬志浩然有夷齊之髙蘧伯玉卷舒之術度遼將軍安㝎皇甫規字威明狀規少有岐嶷正直之節對䇿指㓨黄門梁兾不能用退隠山谷敦樂詩書右魏文帝𥘉爲丞相魏王所旌表二十四賢後明帝乃𫐠撰其狀見文帝令及甄表狀太常燉煌張奐字然明爲度遼將軍幽并清静吏民歌之徴拜大司農賜錢除家一人爲郎辤不受願徙居華隂故始爲弘農人度遼將軍安定皇甫規字威明太尉武威叚熲字紀明右凉州三明並著威名於桓靈之丗悉名士也見續漢書韋權字孔衡弟瓉字孔玉瓉弟矩字孔規右太尉掾韋子才之三子皆修仁義兄弟孝友逢盗賊一人病不能去兄弟相慕兵至俱死時人稱之號韋三義見三輔决録荀儉字伯慈漢侍中恱之父儉弟緄字仲慈濟南相漢光禄大夫或之父年六十六緄弟靖字叔慈或問汝南許劭靖爽孰賢邵曰二人皆玉也慈明外朗叔慈内潤靖隠身修學動必以禮太尉辟不就年五十五靖弟壽字慈光舉孝㢘年七十壽弟汪字孟慈昆陽令年六十汪弟爽字慈明公車徴爲平原相遷光禄勲司空出自巖藪九十三日遂登台司年六十三爽弟肅字敬慈守舞陽令年五十肅弟旉字㓜慈司徒掾年七十右朗陵令潁川荀季和之八子並有德業時人號之八龍居西豪里勃海宛康知名士也時爲潁隂令羙之曰髙陽氏才子八人遂改所居爲髙陽里見張璠漢紀及荀氏譜公沙紹字子起紹弟孚字允慈北海耆舊傳稱浮與荀爽共約出不得事貴勢而爽當董卓時脫巾未百日位至司空後相見以爽違約割席而坐孚弟恪字允讓恪弟逵字義則逵弟樊字義起右北海公沙穆之五子並有令名京師號曰公沙五龍天下無雙穆亦名士也見魏明帝甄表狀及後漢書膠東令盧汜昭字興先樂城令剛戴祈字子陵潁隂令剛徐晏字孟平涇令盧夏隠字叔丗州别駕蛇丘劉彬字文曜一云丗州右濟北五龍少並有異才皆稱神童當桓靈之丗時人號爲五龍見濟北英賢傳孝㢘杜陵金敞字元休位至兖州刺史上計掾長陵弟五廵字文休興先之子興先名種司空伯魚之孫名士也不詳廵位所至時辟太尉掾上計掾杜陵韋端字甫休位至凉州牧太尉右同郡齊名時人號之京兆三休並以光和元年察舉見三輔决録晉宣帝河南司馬懿字仲逹魏司空潁川陳群字長文中領軍譙朱鑠字彦才侍中濟隂呉質字季重右魏文帝四友見晉紀魏歩兵校尉陳留阮籍字嗣宗中散大夫譙嵆康字叔夜晉司徒河内山濤字巨源建威參軍沛劉伶字伯倫始平太守陳留阮咸字仲容籍兄子散騎常侍河内向秀字子期司徒琅邪王戎字濬沖右魏嘉平中並居河内山陽共爲竹林之游丗號竹林七賢見晉書魏書袁宏戴逵爲傳孫統又爲讃呉範相風吴人劉惇占氣河内人趙逹筭河内人皇象書廣陵人嚴子卿棊名昭武衛尉畯從子宋壽占夢十不失一曺不興晝爲孫權畫屏風筆墨悮點因以爲蝇後張御坐權以爲真蠅手彈不去方知其非也孤城鄭姥相見王粲於童賤謂仕必主師傳後爲太子太傳右呉八絶見張勃呉録陳留董昶字仲道琅琊王澄字平子陳留阮瞻字千里一云阮八百即瞻弟孚字遥集朗率多通故大將軍王敦云方瞻有减故云八百潁川庚凱字子嵩陳留謝鯤字㓜輿太山胡母輔之字彦國沙門于法龍樂安光逸字孟祖右晉中朝八逹近丗聞之故老裴徽字文秀魏兾州刺史裴楷字叔則徽弟三子晉光禄大夫裴綽字季舒楷弟長水校尉裴瓉字國寳楷子中書郎裴邈字景𥘉楷孫欽子太傳左司馬裴遐字叔道瓉子太傳主簿裴康字仲豫徽弟二子太子左率裴頠字逸民揩孫季子晋尚書㒒射王祥字休徴晋太保王戎字濬冲父渾凉州刺史祥族子司徒王澄字平子衍弟裴綽女壻荆州刺史王導字茂弘覽孫裁子敦從弟丞相王綏字萬子戎子早亡裴康女壻王衍字夷甫父又平北將軍戎從弟太尉王敦字處仲覽孫基弟二子大將軍王玄字眉子衍子陳留内史右河東八裴琅邪八王聞之於故老魏司空王昶字文舒昶子汝南太守湛字處沖湛子東海内史承字安期承子驃騎將軍𫐠字懷祖𫐠子安北將軍坦之字文度魏尚書㒒射杜畿字伯侯畿子幽州刺史恕字務伯恕子鎮南將軍預字元凱預子散騎常侍錫字丗嘏錫子光禄大夫又字弘治右太原王京兆杜各稱五丗盛德聞之於故老凡書籍所載及故老所傳善惡聞於丗者盖盡於此矣漢稱田叔孟舒等十人及田横兩客魯八儒史並失其名夫操行之難而姓名翳然所以撫卷長嘆不能巳巳者也八儒二子没後散於天下設於中國成百氏之源爲綱紀之儒居環堵之室蓽門圭竇甕牖䋲樞併日而食以道自居者有道之儒子思氏之所行也衣冠中動作順大讓如慢􅘁讓如僞者子張氏之所行也顔氏傳詩爲道爲諷諌之儒孟氏傳書爲道爲踈通致逺之儒漆雕氏傳禮爲道爲恭儉莊敬之儒仲梁氏傳樂爲道以和隂陽爲移風易俗之儒樂正氏傳春秋爲道爲屬辭比事之儒公孫氏傳易爲道爲㓗淨精微之儒三墨不累於俗不飾於物不尊於名不忮於衆此宋鉶尹文之墨裘褐爲衣跂蹻爲服日夜不休以自苦爲極者相里勤五侯子之墨俱稱經而背譎不同相謂别墨以堅白此苦獲巳齒鄧陵子之墨靖節徴士誄宋金紫光禄大夫贈特進顔延年夫璿玉致羙不爲池湟之寶桂椒信芳而非園林之實豈其樂深而好逺哉盖云殊性而巳故無足而至者物之藉也随踵而立者人之薄也若乃巢由之抗行夷皓之峻節故巳父老尭禹錙銖周漢而緜丗寖逺光靈不屬至使菁華隠没芳流歇絶不亦惜乎雖今之作者人自爲量而首路同塵輟塗殊軌者多矣豈所以昭末景汛餘波乎有晋徴士潯陽陶淵明南嶽之幽居者也弱不好弄長實素心學非稱師文取指逹在衆不失其寡處言毎見其嘿少而貧苦一病作居無僕妾井臼弗任藜菽不給母老子㓜就飬勤匱逺惟田生致親之議追一作近悟毛子捧檄之懐𥘉辤州府三命後爲彭澤令道不偶物棄官從好遂乃解體丗紛結志區外定迹深棲於是乎遂一作逺灌畦鬻𬞞爲供魚菽之祭織絇緯蕭以充糧粒之費心好異書性樂酒德簡棄煩促就成省曠殆所謂國爵屏貴家人忘貧者歟有詔徴著作郎稱疾不赴春秋六十有三元嘉四年月日卒於潯陽縣之某里一作桑里柴近識悲悼逺土傷情冥黙福應嗚呼淑貞夫實以誄華名由謚髙苟允德義貴賤何筭焉若其寛樂令終之羙好廉克巳之操有合謚典無愆前志故詢諸友好冝謚曰靖節徴士其詞曰物尚孤一作特生人固介立豈伊時遘曷云丗及嗟乎若士望古遥集韜此洪族蔑彼名級睦親之行至自非敦然諾之信重於布言㢘深簡絜貞夷粹温和而能峻博而不繁依丗尚同詭時則異有一於此而兩一作兩非黙置豈若夫子囙心違事一作逹理畏榮好古薄身厚志丗覇虚禮州壤推風孝惟義飬道必懐邦人之秉彛不隘不恭爵同下士禄䓁上農度痁疾視化如歸臨凶若吉藥劑弗甞禱祠非恤傃幽苦終懐和長畢嗚呼哀哉敬𫐠清一作靖節式遵遺占存不願豐没無求贍省訃却􅉠輕哀薄歛遭壤以穿旋葬而窆嗚呼哀哉深心追徃逺情逐化自爾介居及我多暇伊好之洽接閻隣舎宵盤晝憩非舟非駕念昔宴私舉觴相誨獨正者危至方則礙哲人卷舒布在前載取鑑不逺吾規子佩爾寔愀然中言而發遺衆速尤迕風光蹶身才非實榮聲有歇徽一作叡音永矣誰箴余闕嗚呼哀哉仁焉而終智焉而斃黔婁旣没展禽亦逝其在先生同塵徃丗旌此靖節加彼康恵嗚呼哀哉傳昭明太子陶淵明字元亮或云潜字淵明潯陽柴桑人也曽祖侃晉大司馬淵明少有髙趣博學善屬文潁脫不羣任眞自得甞著五柳先生傳以自况曰先生不知何許人也亦不詳姓字宅邊有五柳樹一本無樹字因以爲號焉閑静少言不慕榮利好讀書不求甚解毎有㑹意欣然忘食性嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輙盡期在必醉既醉而退曽不悋情去留環堵蕭然不蔽風日短褐穿結簞瓢屡空晏如也甞箸文章自娯頗示己志忘懐得失以此自終時人謂之實録親老家貧起爲州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾江州刺史檀道濟徃候之偃卧瘠餒有日矣道濟謂曰賢者處丗天下無道則隠有道則至今子生文明之丗奈何自苦如此對曰潜也何敢望賢志不及也道濟饋以梁肉麾而去之後爲鎮軍建威叅軍謂親朋曰聊欲弦歌以爲三徑之資可乎執事者聞之以爲彭澤令不以家累自隨送一力給其子書曰汝旦夕之費自給爲難今遣此力助汝薪水之勞此亦人子也可善遇之公田悉令吏種秫曰吾常得醉於酒足矣妻子固請種秔乃使二頃五十畒種秫五十畒種粳歲終㑹郡遣督郵至縣吏請曰應束帶見之淵明歎曰我豈能爲五斗米折腰向郷里小兒即日解綬去職賦歸去来徴著作郎不就江州刺史王弘欲識之不能致也淵明嘗徃廬山弘命淵明故人龐通之齎酒具於半道栗里之間邀之淵明有脚疾使一門生二兒舁一作㪯籃輿既至欣然便共飲酌俄頃弘至亦無迕也先是顔延之爲劉抑後軍功曺在潯陽與淵明情欵後爲始安郡經過潯陽日造淵明飲焉毎徃必酣飲致醉弘欲邀延之坐一作赴坐彌日不得延之臨去留二萬錢與淵明淵明悉遣送酒家稍就取酒嘗九月九日出宅邊菊叢中坐乆之滿手把菊忽值弘送酒至即便就酌醉而歸淵明不解音律而蓄無絃琴一作無絃素琴一張毎酒適輙撫弄以寄其意貴賤造之者有酒輙設淵明若先醉便語客我醉欲眠卿可去其真率如此郡將常候之值其釀熟取頭上葛巾漉酒漉畢還復著之時周續之入廬山事釋恵逺彭城劉遺民亦遁迹匡山淵明又不應徴命謂之潯陽三隠後刺史檀韶苦請續之出州與學士祖企謝景夷三人共在城北講禮加以讎校所住公廨近於馬隊是故淵明示其詩云周生𫐠孔業祖謝響然臻馬隊非講肆校書亦巳勤其妻翟氏亦能安勤苦與其同忘自以曽祖晋丗宰輔耻復屈身後代自宋髙祖王業漸隆不復肯仕元嘉四年將復徴命㑹卒時年六十三丗號靖節先生箋註陶淵明集卷之十
