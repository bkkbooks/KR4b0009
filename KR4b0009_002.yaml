front:
  text: 箋注陶淵明集卷之二
  hash: sha256:dd3bdc976bec43e808da8a50268c41aa530647f93a0fa0536886cea0f40b03ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_002-1a}
body:
  text: 詩五言形影神貴踐賢愚莫不營營以惜生斯甚惑焉故極陳形影之苦言神辨自然以釋之好事君子共取其心焉形贈影天地長不沒山川無改時草木得常理霜露榮悴之謂人最靈智獨復不如兹適見在丗中奄去靡歸期奚覺無一人親識豈相思但餘平生物舉目情悽洏洏如之切涕流貌我無騰化術必爾不復疑願君取吾言得酒莫苟辭影答形存生不可言衛生每苦拙誠願遊崑華邈然兹道絶與子相遇來未嘗異悲恱憩蔭若暫乖止日終不别此同既難常黯爾俱時滅身沒名亦盡念之五情熱立善有遺愛胡為不自竭酒云能消憂方此詎不劣神釋大鈞無私力萬理自森著人為三才中豈不以我故與君雖異物生而相依附結託善惡同安得不相語三皇大聖人今復在何處彭祖壽永年欲留不得住彭祖姓籛名鏗顓頊肱孫進雉羮於堯堯封於彭城歷夏經殷至周年八百歲老少同一死賢愚無復數日醉或能忘將非促齡貝立善常所欣誰當為汝譽日醉釋前篇立善釋後篇甚念傷吾生正冝委運去縱浪大化中不喜亦不懼應盡便須盡無復獨多慮鶴林曰人為三才中豈不以我故我神自謂也人與天地並立而為三以此心之神也若塊然血肉豈足以並天地哉末縱浪大化中四句是不以死生禍福動其心泰然委順養神之道也淵明可謂知道之士矣九日間居余間居愛重九之名秋菊盈園而持醪靡由空服九華寄懷於言丗短意常多斯人樂久生日月依辰至舉俗愛其名露淒暄風息氣徹天象明往燕無遺影來鴈有餘聲酒能祛百慮菊為制頺齡如何蓬廬士空視時運傾空視時運傾指易代之事塵爵恥虛罍寒華徒自榮斂襟獨間謡緬焉起深情棲遲固多娛淹留豈無成淹留無成騷人語也今反之謂不得於彼則得於此後棲遲詎為拙亦同古詩云人生不滿百常懷千歲憂而淵明以五字盡之曰世短意常多東坡曰意長日月促則倒轉陶句耳歸園田居六首其一少無適俗韻性本愛丘山誤落塵網中一去三十年羇鳥戀舊林池魚思故淵開荒南野際守拙歸園田方宅十餘畒草屋八九間榆柳蔭後園桃李羅堂前曖曖逺人村依依墟里煙狗吠深巷中雞鳴桑樹巔戶庭無塵雜虛室有餘間久在樊籠裏復得返自然冷齋夜話曰東坡嘗云淵明詩𥘉視若散緩熟視有竒趣如曰曖曖逺人村依依墟里煙狗吠深巷中雞鳴桑樹巔又曰採菊東籬下悠然見南山大率才髙意逺則所寓得其妙遂能如此如大匠運斤無斧鑿痕不知者則疲精力至死不悟其二野外罕人事窮巷寡輪鞅白日掩荆扉虛室絶塵想時復墟曲中披草共來往相見無雜言但道桑麻長桑麻日已長我土日已廣常恐霜霰至零落同草莾其三種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸道狹草木長夕露沾我衣衣沾不足惜但使願無違前漢王惲傳田彼南山蕪穢不治種一頃豆落而為箕人生行樂耳須冨貴何時東坡曰以夕露沾衣之故而違其所願者多矣其四久去山澤遊浪莾林野娛試携子姪輩披榛步荒墟徘徊丘壠間依依昔人居井竈有遺處桑竹殘朽株借問採薪者此人皆焉如薪者向我言死沒無復餘一丗異朝市此語真不虛人生似幻化終當歸空無其五悵恨獨䇿還崎嶇歷榛曲山澗清且淺遇以濯吾足漉我新熟酒隻雞招近局日入室中暗荆薪代明燭歡來苦夕短巳復至天旭其六種苗在東皋苗生滿阡陌雖有荷鋤倦濁酒聊自適日暮巾柴車路暗光已夕歸人望煙火稚子候簷隙問君亦何為百年會有役但願桑麻成蠶月得紡績素心正如此開徑望三益韓子蒼曰田園六首末篇乃序行役與前五首不類今俗本乃取江淹種苗在東皋為末篇東坡亦因其誤和之陳述古本止有五首豫以為皆非也當如張相國本題為雜詠六首江淹雜擬詩亦頗似之但開徑望三益此一句不類東澗曰但願桑麻成蠶月得紡績則與陶公語判然矣問來使爾從山中來早晚發天目山名在武林我屋南窗下今生幾叢菊薔薇葉已抽秋蘭氣當馥歸去來山中山中酒應熟西清詩話曰此篇獨南唐與朝文元家二本有之東澗曰此蓋晚唐人因太白感秋詩而偽為之遊斜川辛丑正月五日天氣澄和風物間美與二三鄰曲同遊斜川臨長流望曽城駱庭芝云曽城落星寺也殆之晉所有者魴鯉躍鱗於將久水鷗乘和以翻飛彼南阜者名實舊矣不復乃為嗟歎若夫曽城傍無依接獨秀中臯遙想靈山有愛嘉名天問崑崙縣圃其尻安在增城九重其髙幾里淮南子崑崙中有增城九重注云中有五城十二樓故云靈山嘉名欣對不足率爾賦詩悲日月之遂往悼吾年之不留各疏年紀鄉里以記其時日開歲倐五日吾生行歸休念之動中懷及辰為兹遊氣和天惟澄班坐依逺流弱湍湍急賴也馳文魴間谷矯鳴鷗逈澤散遊目緬然睇曽丘雖微九重秀九重注見上顧瞻無匹儔提壷接賓侶引滿更獻酬未知從今去當復如此不中觴縱遙情忘彼千載憂且極今朝樂明日非所求按辛丑歲靖節年三十七詩曰開歲倐五十乃義熙十年甲寅以詩語證之序為誤今作開歲倐五日則與序中正月五日語意相貫示周續之祖企謝景夷三郎時三人比講禮校書負痾頺簷下終日無一欣藥石有時間念我意中人相去不尋常道路邈何因周生述孔業祖謝響然臻薦你表羣土響臻道喪向千載今朝復斯聞馬隊非講肆校書亦已勤老夫有所愛思與爾為鄰願言誨諸子從我頴水濱春秋云堯朝許由於沛澤之中日請屬天下於夫子許由遂之箕山之下頴水之陽泉山曰按靖節不事覲謁惟至田舍及廬山遊觀舍是無他適續之自社主逺公順寂之後雖隱居廬山而州將每相招引頗從之遊世號通隱是以詩中引箕頴之事微譏之乞食飢來驅我去不知竟何之行行至斯里叩門拙言辭主人解余意遺贈豈虛來談話終日夕觴至輒傾杯情欣新知歡言詠遂賦詩感子漂母惠愧我非韓才銜戢知何謝冥報以相貽東坡曰淵明得一食至欲以冥謝主人哀哉哀哉此大類丐者口頰也非獨余哀之舉丗莫不哀之也飢寒常在身前功名常在身後二者不相待此士之所以窮也諸人共遊周家墓柏下今日天氣佳清吹與鳴彈吹尺偽切虛也感彼柏下人安得不為歡清歌散新聲緑酒開芳顔未知明日事余襟良已殫怨詩楚調示龐主簿遵鄧治中天道幽且逺鬼神茫昧然結髮念善事僶俯六九年弱冠逢世阻始室喪其偏其年二十喪偶繼取翟氏炎火屢焚如螟蜮恣中田蔡氏注蜮蟲水中含沙射人非食苗桑蟲意此蝢蜮當是螟風雨縱橫至收斂不盈㕓夏日長抱飢寒夜無𬒳眠造夕思雞鳴及晨願烏遷謂日烏月兔飛走之速也在已何怨天離憂悽目前吁嗟身後名於我若浮煙慷慨獨悲歌鍾期信為賢薛易簡正音集云琴之操弄約五百餘名多緣古人幽憤不得志而作也今引子期知音事而命篇曰怨詩楚調庸非度調為辭欲𬒳絃歌乎趙泉山曰集中惟此詩歷敘平素多艱如此而一言一字率直致而務紀實也答龐參軍三復來貺欲罷不能自爾鄰曲冬春再交欵然良對忽成舊遊俗諺云數面成親舊况情過此者乎人事好乖便當語離楊公所歎豈惟常悲吾抱疾多年不復為文本既不豐謂癯瘁也復老病繼之輒依周孔往復之義且為别後相思之資楊公楊朱也相知何必舊傾蓋定前言有客賞我趣每每顧林園談諧無俗調所説聖人篇或有數斗酒間飲自歡然我實幽居士無復東西緣物新人唯舊弱毫多所宣情通萬里外形迹滯江山君其愛體素曹子建詩王其愛玉體來會在何年五月旦作和戴主簿虛舟縱逸棹回復遂無窮發嵗始俯仰星紀奄將中南窗罕悴物北林榮且豐神淵寫時雨晨色奏景風史記律書景風者居南方景者言陽道竟故日景風既來孰不去人理固有終居常待其盡曲肱豈傷沖遷化或夷險肆志無窊隆即事如巳髙何必升華嵩連雨獨飲運生會歸盡終古謂之然丗間有松喬於今定何間故老贈余酒乃言飲得仙試酌百情逺重觴忽忘天天豈去此哉任真無所先雲鶴有竒翼八表須臾還自我抱兹獨僶俯四十年形骸久已化心在復何言趙泉山曰按晉傳靖節未嘗有喜愠之色唯遇酒則飲時或無酒亦雅詠不輟飲酒詩云不覺知有我安知物為貴獨飲詩云試酌百情逺重觴忽忘天天豈去此哉任真無所先此酒中實際理地也豈狂藥昏醟之語移居二首其一昔欲居南村即栗里也非為卜其宅聞多素心人樂與數晨夕懷此頗有年今日從兹役弊廬何必廣取足蔽床席鄰曲時時來指顔延年殷景仁龐通之輩抗言談在昔竒文共欣賞竒文見王褒傳疑義相與析其二春秋多佳日登髙賦新詩過門更相呼有酒斟酌之農務各自歸間暇輒相思相思則披衣言笑無厭時此理將不勝音升任也無為忽去兹言此樂不可勝無為舍而去之韓子亦曰樂之終身不厭何暇外慕衣食當須紀力耕不吾欺和劉柴桑遺民嘗作柴桑令山澤久見招胡事乃躊躇直為親舊故未忍言索居良辰入竒懷挈杖還西廬時遺民約靖節隱山結白蓮社靖節雅不欲預其社列但時復往還於廬阜間荒塗無歸人時時見廢墟茅茨巳就治新疇復應畬爾雅田三歲曰畬靖節自庚戌徙居南材已再稔矣今秋穫後復應畬也谷風轉淒薄爾雅釋天東風謂之谷風春醪解飢劬弱女雖非男慰情良勝無栖栖丗中事歲月共相踈耕織稱其用過此奚所須去去百年外身名同翳如趙泉山曰谷風轉淒薄四句雖出於一時之諧謔亦可謂巧於處窮矣以弱女喻酒之醨薄飢則濡枯腸寒則若挾纊曲盡貧士嗜酒之常態酬劉柴桑窮居寡人用時忘四運周櫚庭多落葉慨然已知秋新葵欎北墉嘉穟養南疇今我不為樂知有來歲不命室携童弱良日登逺遊和郭主簿二首其一藹藹堂前林中夏貯清隂凱風因時來回颷開我襟息交遊間業卧起弄書琴園𬞞有餘滋舊榖猶儲今營巳良有極過足非所欽舂秫作美酒酒熟吾自斟弱子戲我側學語未成音此事真復樂聊用忘華簪遙遙望白雲懷古一何深其二和澤周三春清涼素秋節露凝無遊氛天髙風景徹陵岑聳逸峯遙瞻皆竒絶芳菊開林耀青松冠巖列懷此貞秀姿卓為霜下傑銜觴念幽人千載撫爾訣檢素不獲展厭厭竟良月於王撫軍座送客秋日凄且厲百卉具已腓四月詩云秋日凄凄百卉具腓集本作各傳寫之誤爰以履霜節登髙餞將歸寒氣冒山澤遊雲倐無依洲渚四緬邈風水互乖違瞻夕欲良宴離言聿云悲晨鳥暮來還懸車斂餘輝淮南子日至悲泉是謂懸車逝止判殊路旋駕悵遲遲目送回舟逺情隨萬化遺按年譜此詩宋武帝永𥘉二年辛酉秋作也宋書王弘名元休為撫軍將軍江州刺史庾登之為西陽太守今黃州𬒳徴還謝瞻為豫章太守今洪州將赴郡王弘送至湓口今潯陽之湓浦三人於此賦詩敘别是必休元要靖節預席餞行故文選載謝瞻即席集别詩首章紀座間四人與殷晉安别景仁名鐡殷先作晉安南府長史椽因居潯陽後作大尉劉裕參軍移家東下作此以贈遊好非久長一遇盡殷勤瀨真子云遊好非久長日本作非少長其意云吾與子非少時長時遊從也但今一相遇故定交耳信宿酬清話益復知為親去歲家南里薄作少時鄰負杖肆遊從淹留忘宵晨語默自殊勢亦知當乖分未謂事已及興言在兹春飄飄西來風悠悠東去雲山川千里外言笑難為因良才不隱丗江湖多賤貧脫有經過便念來存故人贈羊長史松齡左軍羊長史銜使秦川關中作此與之愚生三季後慨然念黃虞得知千載外正賴古人書山谷云正賴古人書蓋當時語或作上賴甚失語意賢聖留餘迹事事在中都洛陽西晉之故郡長安乃秦漢所都豈忘遊心目關河不可踰九域甫巳一謂宋公裕始平一燕素也逝將理舟輿聞君當先邁負痾不獲俱時松齡銜左將軍朱齡石之命詣裕行府賀平關洛原詩意靖節𥘉欲從松齡訪關洛會病不果行路若經啇山為我少躊躇多謝綺與角精爽今何如紫芝誰復採深谷久應蕪駟馬無貰患貰侍夜切賖也貸也貧賤有交娛清謡結心曲人乘運見踈擁懷纍代下言盡意不舒胡仔曰淵明髙風峻節固已無愧於四皓然猶仰慕之足見其好賢尚友之心湯東澗曰天下分裂而中州賢聖之迹不可得而見今九土既一則五帝之所連三王之所爭冝當首訪而獨多謝於啇山之人何哉蓋南北雖合而世代將易但當與綺角遊耳逺矣深哉歲暮和張常侍市朝悽舊人驟驥感悲泉悲泉見前驟驥言白駒之過隙明旦非今日歲暮余何言素顔斂光潤白髮一巳繁闊哉秦穆談旅力豈未愆向夕長風起寒雲沒西山厲厲氣遂嚴紛紛飛鳥還民生鮮常在矧伊愁苦纒屢闕清酤至無以樂當年窮通靡攸慮憔悴由化遷撫巳有深懷履運增慨然湯東澗曰陶公不事異代之節與子房五丗相韓之義同既不為狙擊震動之舉又時無漢祖者可托以行其志所謂撫巳有深懷履運增慨然讀之亦可以深悲其志也矣和胡西曹示顧賊曹㽔賓五月中史記律書五月也律中蕤賓隂氣幼少故曰㽔萎陽不用事故曰賓清朝起南颸颸息兹切風也不駃亦不遲駃踈吏切疾也飄飄吹我衣重雲蔽白目間雨紛微微流目視西園曄曄榮紫葵於今甚可愛奈何當復衰感物願及時每恨靡所揮悠悠待秋稼寥落將賖遲逸想不可淹猖狂獨長悲悲從弟仲德銜哀過舊宅悲淚應心零借問為誰悲懷人在九冥禮服名羣從恩曖若同生門前執手時何意爾先傾在數竟未免為山不及成慈母沉哀疚二㣧才數齡雙位委空館朝夕無哭聲流塵集虛坐宿草旅前庭階除曠遊迹園林獨餘情翳然乘化去終天不復形遲遲將回步惻惻悲襟盈箋注陶淵明集卷之二
