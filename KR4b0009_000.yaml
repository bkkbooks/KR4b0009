front:
  text: 陶淵明集序
  hash: sha256:83bfc3ed755fe9b300bc9d3fe7080e9176de2ecbadbf636c1cd6e07294964101
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_000-1a}
body:
  text: 梁昭明太子統撰夫自衒自媒者士女之醜行不忮不求者明逹之用心是以聖人韜光賢人遁丗其故何也含德之至莫踰於道親己之切無重於身故道存而身安道亡而身害處百齡之內居一丗之中倐忽比之白駒寄遇謂之逆旅宜乎與大塊而盈虛隨中和而任放豈能戚戚勞於憂畏汲汲役於人間齊謳趙女之娛八珍九鼎之食結駟連騎之榮侈𬒮執圭之貴樂既樂矣憂亦隨之何倚伏之難量亦慶弔之相及智者賢人居之甚履薄氷愚夫貪士競之若泄尾閭玉之在山以見珍而終破蘭之生谷雖無人而自芳故莊周垂釣於濠伯成躬耕於野或貨海東之藥草或紡江南之落毛譬彼鴛雛豈競鳶鴟之肉猶斯雜縣寧勞文仲之牲至于子常寧喜之倫蘇秦衛鞅之匹死之而不疑井之而不悔主父偃言生不五鼎食死則五鼎烹卒如其言豈不痛哉又楚子觀周受折於孫滿霍侯驂乘禍起於負芒叨餮之徒其流甚衆唐堯四海之主而有汾陽之心子晉天下之儲而有洛濵之志輕之若脫屣視之若鴻毛而况於他人乎是以至人逹士因以晦迹或懷釐而謁帝或披褐而負薪鼓楫清潭棄機漢曲情不在於衆事寄衆事以忘情者也有疑陶淵明詩篇篇有酒吾觀其意不在酒亦寄酒為迹者也其文章不群辭彩精拔跌宕昭彰獨超衆類抑揚爽㓪莫之與京橫素波而傍流干青雲而直上語時事則指而可想論懷抱則曠而且真加以貞志不休安道苦莭不以躬耕為恥不以無財為病自非大賢篤志與道汙隆孰能如此乎余愛嗜其文不能釋手尚想其德恨不同時故加搜校粗為區目白璧微瑕惟在間情一賦揚雄所謂勸百而諷一者卒無諷諌何足搖其筆端惜哉亡是可也并粗點定其傳編之于録嘗謂有能觀淵明之文者馳競之情遣鄙吝之意祛貪夫可以廉懦夫可以立豈止仁義可蹈抑乃爵祿可辭不必傍游泰華逺求柱史此亦有助於風教也箋注陶淵明集目録卷之一詩四言停雲并序時運并序榮木并序贈長沙公并序酬丁柴桑答龐參軍并序勸農命子歸鳥卷之二詩五言形贈影并序影答形神釋九日間居并序歸園田居六首問來使遊斜川并序示周祖謝三郎乞食游周家墓柏下怨詩楚調示龐主簿鄧治中答龐參軍并序五月旦作和戴簿連雨獨飲移居二首和劉柴桑酬劉柴桑和郭主簿二首於王撫軍座送客别殷晉安并序贈羊長史并序和張常侍和胡曹示顧曹悲從弟仲德卷之三詩五言始作鎮軍參軍經曲阿庚子歲五月中從都還阻風二首辛丑歲七月赴假還江陵癸卯歲始春懷古田舍二首癸卯十二月中作與從弟敬逺乙巳歲三月使都經錢溪還舊居戊申歲六月遇火已酉歲九月九日庚戌歲九月中於西田穫早稻丙辰歲八月中於下潠田舍穫飲酒二十首止酒述酒責子有㑹而作并序蠟日四時卷之四詩五言擬古九首雜詩十二首詠貧士七首詠二踈詠三良詠荆軻讀山海經十三首擬挽歌辭三首間情賦卷之七傳贊天子孝傳贊諸侯孝傳贊卿大夫孝傳贊士孝傳贊庶人孝傳贊卷之八疏祭文與子儼等疏祭程氏妹文祭從弟敬逺文自祭文卷之九集聖賢群輔録上卷之十集聖賢群輔録下箋注陶淵明集目録終𥙷注陶淵明集總論廬陵後學李公煥集録朱文公語録曰晉宋人物雖曰尚清髙然箇箇要官職這邊一面清談那邊一面招權納貨陶淵明真個是能不要此所以髙於晉宋人物朱文公語録曰作詩須從陶柳門中來乃佳不如是無以發蕭散冲淡之趣不免於局促塵埃無由到古人佳處楊龜山語録曰淵明詩所不可及者冲淡深粹出於自然若曽用力學然後知淵明詩非著力所能成也真西山曰淵明之作冝自為一編以附于三百篇楚詞之後為詩之根本準則胡仔苕溪漁隱叢話曰東坡在頴州時因歐陽叔弼讀元載傳歎淵明之絶識遂作詩云淵明求縣令本緣食不足束帶向督郵小屈未為辱翻然賦歸去豈不念窮獨重以五斗米折腰營口腹云何元相國萬鍾不滿欲胡椒銖兩多安用八百斛以此殺其身何翅抵鵲玉往者不可悔吾其反自燭淵明隱約栗里柴桑之間或飯不足也顔延年送錢二十萬即日送酒家與蓄積不知紀極至藏胡椒八百斛者相去逺近豈直睢陽蘇合彈與蜣蜋糞丸比哉東坡曰孔子不取微生髙孟子不取於陵仲子惡其不情也陶淵明欲仕則仕不以求之為嫌欲隱則隱不以去之為髙飢則扣門而乞食飽則雞黍以迎客古今賢之貴其真也東坡曰淵明作詩不多然其詩質而實綺癯而實腴自曹劉鮑謝李杜諸人皆莫及也葛常之曰東坡拈出淵明談理之詩有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寶皆以為知道之言蓋摛章繪句嘲風弄月雖工亦何𥙷若覩道者出語自然超詣非常人能蹈其軌轍也黃山谷跋淵明詩卷曰血氣方剛時讀此詩如嚼枯木及綿歷丗事知决定無所用智又云謝康樂庾義城之詩爐錘之功不遺餘力然未能窺彭澤數仞之墻者二子有意於俗人贊毀其工拙淵明直寄焉持是以論淵明亦可以知其關鍵也山谷道人曰寧律不諧不使句弱用字不工不使語俗此庾開府之所長也然有意於為詩也至於淵明則所謂不煩繩削而自合者雖然巧於斧斤者多疑其拙窘於檢括者輒病其放孔子曰寧武子其智可及也其愚不可及也淵明之拙與放豈可為不知者道哉道人曰如我按指海印發光汝暫舉心塵勞先起說者曰若以法眼觀無俗不真若以丗眼觀無真不俗淵明之詩要當與一丘一壑者共之耳山谷曰退之於詩本無解處以才髙而好耳淵明不為詩寫其胸中之妙耳無韓之才與陶之妙而學其詩終樂天耳胡仔苕溪漁隱曰鍾嶸評淵明詩為古今隱逸詩人之宗余謂陋哉斯言豈足以盡之不若蕭統云淵明文章不群詞彩精拔跌宕昭彰獨超衆類抑揚爽朗莫之與京橫素波而傍流干青雲而直上語時事則指而可想論懷抱則曠而且真加以貞志不休安道苦節不以躬耕為恥不以無財為病自非大賢篤志與道汚隆孰能如是乎此言盡之矣葛常之韻語陽秋曰陶潜謝眺詩皆平淡有思致非後來詩人怵心劌目雕琢者所為也老杜云陶謝不枝梧風騷共推激紫燕自超詣翠駮誰剪剔是也大抵欲造平淡當自組麗中來落其紛華然後可造平淡之境如此則陶謝不足進矣今之人多作拙易詩而自以為平淡識者未嘗不絶倒也梅聖俞和晏相詩云因令適性情稍欲到平淡苦詞未圎熟刺口劇菱芡言到平淡處甚難也李白云清水出芙蓉天然去雕飾平淡而到天然處則善矣陳后山曰鮑昭之詩華而不弱陶淵明之詩切於事情但不文耳西溪詩話曰淵明意趣真古清淡之宗詩家視淵明猶孔門視伯夷也休齊曰人之為詩要有野意語曰質勝文則野蓋詩非文不腴非質不枯能始腴而終枯無中邊之殊意味自長風人以來得野意者淵明而已雪浪齊日記曰為詩欲詞格清美當看鮑照謝靈運欲渾成而有正始以來風氣當看淵明劉後村曰士之生丗鮮不以榮辱得喪撓敗其天真者淵明一生惟在彭澤八十餘日涉丗故餘皆髙枕北窗之日無榮惡乎辱無得惡乎喪此其所以為絶唱而寡和也二蘇公則不然方其得意也為執政侍從及其失意也至下獄過嶺晚更憂患於是始有和陶之作二公雖惓惓於淵明未知淵明果印可否蔡寬夫曰柳子厚之貶其憂悲憔悴之歎發於詩者特為酸楚卒以憤死未為逹理白樂天似能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其逹每詩未嘗不著此意是豈真能忘之者哉亦力勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂當喜則喜忽然憂樂兩忘則隨所寓而皆適未嘗有擇於其間所謂超丗遺物者要當如是而後可觀三人之詩以意逆志人豈難見以是論賢不肖之實何可欺乎東坡曰所貴於枯淡者謂外枯而中膏似淡而實美淵明子厚之流是也若中邊皆枯亦何足道佛言譬如食蜜中邊皆甜人食五味知其井苦皆是能分别其中邊者百無一也湯文清公曰按詩中言本志少說固窮多矣惟忍於飢寒之苦而後能存莭義之間西山之所以有餓夫也丗士貪榮祿事豪侈而髙談名義自方於古之人余未之信也按祁寬曰靖莭先生以義熙元年秋為彭澤令其冬解綬去職時四十一嵗矣後十六年晋禪宋又七年卒是為宋文帝元嘉四年南史及梁昭明太子傳不載壽年晋書隱逸傳及顔延之誄皆云年六十三以曆推之生於晉哀帝興寧三年乙丑歲張縯云先生辛丑游斜川詩言開歲倐五十若以詩為正則先生生於壬子歲自壬子至辛丑為年五十迄丁卯考終是得年七十六併記之按張縯曰梁昭明太子傳稱陶淵明字元亮或云潜字淵明顔延之誄亦云有晋徴士潯陽陶淵明以統及延之所書則淵明固先生之名非字也先生作孟嘉傳稱淵明先親君之第四女嘉於先生為外大父先生又及其先親義必以名自見豈得自稱字哉統與延之所書可信不疑晋史謂潜字元亮南史謂潜字淵明皆非也先生於義熙中祭程氏妹亦稱淵明至元嘉中對檀道濟之言則云潜也何敢望賢年譜云在晋名淵明在宋名潜元亮之字則未嘗易此言得之矣箋注陶淵明集總論
