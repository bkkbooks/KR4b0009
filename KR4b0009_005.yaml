body:
  text: 桃花源記并詩桃源經曰桃源山在縣南一十里西北乃沆水曲流而南有障山東帶鈔鑼溪周回三十有二里所謂桃花源也晉太元中武陵人捕魚為業漁人姓黃名道真緣溪行忘路之逺近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣佛若有光便捨船從口入𥘉極狹才通人復行數十步豁然開㓪土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中往來種作男女衣著悉如外人黃髮垂髫並怡然自樂見漁人乃大驚問所從來具答之便要還家設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢無論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡下詣太守說如此太守劉歆太守即遣人隨其往尋向所志遂迷不復得路南陽劉子驥髙尚士也聞之欣然親往未果尋病終後遂無問津者嬴氏亂天紀賢者避其丗黃綺之啇山伊人亦云逝往迹浸復湮來徑遂蕪廢相命肆農耕日入從所憩桑竹垂餘䕃菽稷隨時藝春蠶收長絲秋熟靡王稅荒路曖交通雞犬互鳴吠爼豆猶古法衣裳無新製童孺縱行歌班白歡游詣草榮識節和木襄知風厲雖無紀曆志四時自成歲怡然有餘樂于何勞智慧竒蹤隱五百一朝敞神界淳薄既異源旋復還幽蔽借問游方士焉測塵囂外願言躡䡖風髙舉尋吾契唐子西曰唐人有詩云山僧不解數甲子一葉落知天下秋及觀淵明詩云雖無紀曆志四時自成歲便覺唐人費力如此如桃花源記言尚不知有漢無論魏晉可見造語之簡妙蓋晉人工造語而淵明其尤也東坡曰丗傳桃源事多過其實考淵明所記止言先丗避秦亂來此則漁人所見似是其子孫非秦人不死者也又云殺雞作食豈有仙而殺者乎舊說南陽有菊水水甘而芳居民三十餘家飲其水皆壽或至百二三十歲蜀青城山老人村有五世孫者道極險逺生不識􅐭醯而溪中多枸𣏌根如龍蛇飲其水故壽近歲道稍通漸能致五味而壽益襄桃源蓋此比也使武陵太守得至焉則已化為爭奪之埸久矣常意天壤間若此者甚衆不獨桃源胡仔曰東坡此論蓋辨證唐人以桃源為神仙如王摩詰劉夢得韓退之作桃源行是也惟王介甫作桃源行與東坡之論合桃花源記言大元中事詩云竒蹤隱五百韓退之桃源圗詩又以為六百年洪慶善曰自始皇三十三年築長城明年燔詩書又明年坑儒生三十七年胡亥立三年而滅於漢二漢四百二十五年而為魏魏四十五年而為晉至孝武寧康三年通五百八十八年明年改元太元至太元十二年乃及六百年趙泉山曰靖節退之雖各舉其歲盈數要之六百載為近實而桃花源事當在孝武帝太元十二年丁亥前數年間任安貧武陵記直據竒蹤隱五百之語輒改為太康中彼不知靖節所記劉子驥者正太元時人歸去來兮辭余家貧耕植不足以自給幼稚盈室瓶無儲粟生生所資未見其術親故多勸余為長吏令長也脫然有懷求之靡途㑹有四方之事銜建威命使都諸侯以惠愛為德家叔以余貧苦遂見用于小邑當時刺史得自采辟所部縣令而版授之故云于時風波未靜心憚逺役彭澤去家百里公田之利足以為酒故便求之及少日眷然有歸歟之情何則質性自然非矯勵所得飢凍雖切違巳交病嘗從人事皆口腹自役於是悵然慷慨深愧平生之志猶望一稔當㰸裳宵逝詳序意其艱窶就仕可知尋程氏妹喪于武昌任廣云程氏妹從夫姓也情在駿奔自免去職仲秋至冬在官八十餘日因事順心命篇曰歸去來兮乙巳歲十一月也歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟巳往之不諌知來者之可追實迷途其未逺覺今是而昨非舟遙遙以輕揚風飄飄而吹衣問征夫以前路恨晨光之熹微日欲暮也乃瞻衡宇載欣載奔僮僕歡迎稚子候門三徑就荒松菊猶存三輔决録云蔣詡舍中竹下開三徑唯故人永仲羊仲從之遊也携幼入室有酒盈樽引壷觴以自酌眄庭柯以怡顔倚南窗以寄傲審容膝之易安園日涉以成趣門雖設而常關䇿扶老以流憩時矯首而遐觀雲無心而出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶游丗與我而相違復駕言兮焉求恱親戚之情話樂琴書以消憂農人告余以春及將有事於西疇或命巾車或棹孤舟既窈窕以尋壑亦﨑嶇而經丘木欣欣以向榮泉㳙㳙而始流始音試善萬物之得時感吾生之行休巳矣乎寓形宇內復幾時曷不委心任去留胡為乎遑遑兮欲何之冨貴非吾願帝鄉不可期懷良辰以孤往或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑歐陽文忠公曰晉無文章惟陶淵明歸去來兮辭一篇而巳李格非曰陶淵明歸去來兮辭沛然如肺腑中流出殊不見有斧鑿㾗朱文公曰其詞義夷曠蕭散雖託楚聲而無尤怨切蹙之病休齊曰詩變而為騷騷變而為辭皆可歌也詞則兼詩騷之聲而尤簡邃焉者漢武帝作秋風辭一章三易韻其節短其聲哀此詞之權輿乎陶淵明罷彭澤令賦歸去來而自命曰辭逮令人歌之頓挫抑揚自協聲韻蓋其詞髙甚晉宋而下欲追躡之不能然秋風詞盡蹈襲楚辭未甚敷暢歸去來則自出機杼所謂無首無尾無終無始前非歌而後非辭欲斷而復續將作而遽止謂洞庭鈞天而不淡謂霓裳羽衣而不綺此其以超乎先秦之丗而與之同範也韓子蒼曰傳言淵明以郡遣督郵至即日解印綬去而淵明自叙以程氏妹喪去奔武昌余觀此士既以違巳交病又愧役於口腹意不欲仕久矣及因妹喪即去蓋其孝友如此丗人但以不屈於州縣吏為髙故以因督郵而去此士識時委命其意固有在矣豈一督郵能為之去就哉躬耕乞食且猶不恥而恥屈於督郵必不然矣東坡曰俗傳書生入官庫見錢不識或怪而問之生曰固知其為錢但怪其不在紙褁中耳豫偶讀淵明歸去來辭云幼稚盈室瓶無儲粟乃知俗傳信而有證使瓶有儲粟亦甚微矣此翁平生只於瓶中見粟也耶五桞先生傳先生不知何許人也亦不詳其姓字宅邊有五栁樹因以為號焉間靖少言不慕榮利好讀書不求甚解每有㑹意便欣然忘食性嗜酒家貧不能常得親舊知其如此或置酒而招之造飲輒盡期在必醉既醉而退曽不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也常著文章自娛頗示巳志忘懷得失以此自終贊曰黔婁有言不戚戚於貧賤不汲汲於冨貴其言兹若人之儔乎黔婁注見前酬觴賦詩以樂其志無懷氏之民歟葛天氏之民歟藝苑雌黃曰士人言縣令事多用彭澤五株栁雖白樂天六帖亦然以子考之陶淵明潯陽柴桑人也宅邊有五栁樹因號五栁先生後為彭澤令去家百里則彭澤未嘗有五栁也豫𥘉論此人或不然其說比觀南部新書云晋書陶淵明本傳云潜少懷髙尚博學善屬文嘗作五栁先生傳以自况先生不知何許人不詳姓字宅邊有五柳樹因以為號焉即非彭澤令時所栽人多於縣令事使五栁誤也豈所謂先得我心之所同然者與苕溪漁隱曰沈彬詩陶潜彭澤五株栁潘嶽河陽一縣花皆誤用也晋故西征大將軍長史孟府君傳君諱嘉字萬年江夏鄂人也曽祖父宗以孝行稱仕吳司馬祖父揖元康中為廬陵太守宗葬武昌新陽縣子孫家焉遂為縣人也君少失父奉母二弟居娶大司馬長沙桓公陶侃第十女閨門孝友人無能間鄉閭稱之冲默有逺量弱冠儔類咸敬之同郡郭遜以清操知名時在君右常歎君溫雅平曠自以為不及遜從弟立亦有才志與君同時齊譽每推服焉由是名冠州里聲流京邑大尉頴川庾亮以帝舅民望受分陜之重鎮武昌并領江州辟君部廬陵從事下郡還亮引見問風俗得失對曰嘉不知還傳當問從吏亮以麈尾掩口而笑諸從事既去喚弟翼語之曰孟嘉故是盛德人也君既辝出外自除吏便步歸家母在堂兄弟共相歡樂怡怡如也旬有餘日更版為勸學從事時亮崇修學校髙選儒官以君望實故應尚德之舉大傅河南禇褒簡穆有器識時為豫章大守出朝宗亮正旦大㑹州府人士率多時彥君在坐次甚逺褒問亮江州有孟嘉其人何在亮云在坐卿但自覔褒歷觀遂指君謂亮曰將無是耶亮欣然而笑喜褒之得君竒君為褒之所得乃益器焉舉秀才文為安西將軍庾翼府功曹再為江州别駕巴丘令征西大將軍譙國桓溫參軍君色和而正溫甚重之九月九日溫游龍山參佐畢集四弟二甥咸在坐時佐吏並著戎服有風吹君帽墮落溫目左右及賔客勿言以觀其舉止君𥘉不自覺良久如厠溫命取以還之廷尉太原孫盛為咨議參軍時在坐溫命紙筆令嘲之文成示溫溫以著坐處君歸見嘲笑而請筆作答了不容思文辭超卓四座歎之奉使京師除尚書刪定郎不拜孝宗穆皇帝聞其名賜見東堂君辭以腳疾不任拜起詔使人扶入君嘗為刺史謝永别駕永㑹稽人喪亡君求赴義路由永興髙陽許詢有雋才辝榮不仕每縱心獨往客居縣界嘗乘船近行適逢君過歎曰都邑美士吾盡識之獨不識此人唯聞中州有孟嘉者將非是乎然亦何由來此使問君之從者君謂其使曰本心相過今先赴義尋還就君及歸遂止信宿雅相知得有若舊交還至轉從事中郎俄遷長史在朝隤然仗正順而巳門無雜賔嘗㑹神情獨得便超然命駕徑之龍山顧景酣宴造夕乃歸溫從容謂君曰人不可無勢我乃能駕御卿後以疾終於家年五十一始自總髮至于知命行不苟合言無夸矜未嘗有喜愠之容好酣飲逾多不亂至於任懷得意融然逺寄傍若無人溫嘗問君酒有何好而卿嗜之君笑而答曰明公但不得酒中趣爾又問聽妓絲不如竹竹不如肉答曰漸近自然中散大夫桂陽羅含賦之曰孟生善酣不愆其意光祿大夫南陽劉耽昔與君同在溫府淵明從父太常䕫嘗問耽君若在當巳作公否答云此本是三司人為時所重如此淵明先親君之第四女也凱風寒泉之思實鍾厥心謹按採行事撰為此傳懼或乖謬有虧大雅君子之德所以戰戰兢兢若履深薄云爾贊曰孔子稱進德修業以及時也君清蹈衡門則令問孔昭振纓公朝則德音允集道悠運促不終逺業惜哉仁者必壽豈斯言之謬乎讀史述九章余讀史記有所感而述之夷齊二子讓國相將海隅天人革命絶景窮居采薇髙歌慨想黃虞貞風凌俗爰感懦夫箕子去鄉之感猶有遲遲矧伊代謝觸物皆非哀哀箕子云胡能夷狡童之歌悽矣其悲管鮑知人未易相知實難淡美𥘉交利乖歲寒管生稱心鮑叔必安竒情雙亮令名俱完程杵遺生良難士為知巳望義如歸允伊二子程生揮剱懼兹餘恥令德永聞百代見紀七十二弟子恂恂舞雩莫曰匪賢俱映日月共餐至言慟由才難感為情牽回也早夭賜獨長年屈賈進德修業將以及時如彼稷契孰不願之嗟乎二賢逢丗多疑候瞻寫志感鵩獻辭韓非豐狐隱穴以文自殘君子失時白首抱關巧行居災忮辨召患哀矣韓生竟死說難魯二儒易代隨時迷變則愚介介若人特為貞夫德不百年汙我詩書逝然不顧𬒳褐幽居張長公逺哉長公蕭然何事丗路多端皆為我異㰸轡朅來獨養其志寢跡窮年誰知斯意東坡曰讀史述九章夷齊箕子蓋有感而云去之五百餘載吾猶識其意也葛常之韻語陽秋云淵明讀史九章其間皆有深意其尤章章者如夷齊箕子魯二儒三篇夷齊云天人革命絶景窮居貞風凌俗爰感懦夫箕子云去鄉之感猶有遲遲矧伊代謝觸物皆非魯二儒云易代隨時迷變則愚介介若人特為貞夫由是觀之則淵明委身窮巷甘黔婁之貧而不自悔者豈非以恥事二姓而然耶箋注陶淵明集卷之五
