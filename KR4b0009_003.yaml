front:
  text: 箋注陶淵明集卷之三
  hash: sha256:f7550b34d91432bd78ad20516836cd9672e1bf184fd67657d81ebde3a1e45f84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_003-1a}
body:
  text: 詩五言文選五臣注云淵明詩晉所作者皆題年號入宋所作但題甲子而已意者恥事二姓故以異之嘗考淵明詩有題甲子者始庚子距丙辰凡十七年間只十二首耳皆晉安帝時所作也淵明以乙巳秋為彭澤令在官八十餘日即解印綬賦歸去來辭後一十六年庚申晉禪宋恭帝元熙二年也寧容晉未禪宋前二十年輒恥事二姓所作詩但題甲子以自取異哉矧詩中又無標晉年號者其所題甲子蓋偶記一時之事耳後人類而次之亦非淵明本意秦少遊嘗云宋𥘉受命陶潛自以祖侃晉丗宰輔恥復屈身投劾而歸耕于潯陽其所著書自義熙以前題晉年號永𥘉以後但題甲子而巳黃魯直詩亦有甲子不數義熙前之句然則少遊魯直尚惑於五臣之説他可知矣故著于三卷之首以祛來者之惑云始作鎮軍參軍經曲阿弱齡寄事外委懷在琴書𬒳褐欣自得屢空常晏如時來苟冥會婉孌憩通衢投䇿命晨裝暫與園田踈眇眇孤舟逝綿綿歸思紆我行豈不遙登陟千里餘目倦川塗異心念山澤居望雲慙髙鳥臨水愧遊魚真想𥘉在襟誰謂形迹拘聊且慿化遷終返班生廬班賦求幽貞之所廬鶴林曰士豈能長守山林長親簔笠但居市朝軒冕時要使山林簔笠之念不忘乃為勝耳淵明望雲慙髙鳥四句似此胸襟豈為外榮所點染哉山谷曰㑉玉而心若稿木立朝而意在東山亦此意庚子歲五月中從都還阻風於規林二首其一行行循歸路計日望舊居一欣侍溫顔再喜見友于供駒父云以兄弟為友于歇後語也鼓棹路崎曲指景限西隅江山豈不險歸子念前塗凱風負我心戢枻守窮湖枻以制切楫也髙莾眇無界夏木獨森踈誰言客舟逺近瞻百里餘延目識南嶺空歎將焉如其二自古歎行役我今始知之山川一何曠巽坎難與期巽順也坎險也或日巽風也坎水也言道路行役之艱難崩浪聒天響聒喧語也長風無息時久遊戀所生如何淹在兹靜念園林好人間良可辭當年詎有幾縱心復何疑趙泉山曰二詩皆直敘歸省意辛丑歲七月赴假還江陵夜行塗中一作塗口按江圖自沙陽下流一百五十里至赤坼赤坼二十里至塗口間居三十載遂與塵事冥詩書敦宿好林園無俗情如何捨此去遙遙至南荆叩枻新秋月臨流别友生涼風起將夕夜景湛虛明昭昭天宇闊皛皛川上平懷役不遑寐中宵尚孤征啇歌非吾事依依在耦耕投冠旋舊墟不為好爵縈飬真衡茅下庶以善自名按是時淵明年三十七中間除癸巳為州祭酒乙未距庚子參鎮軍事三十載家居矣癸卯歲始春懷古田舍二首其一在昔聞南畒當年竟未踐屢空既有人春興豈自免夙晨裝吾駕啓塗情已緬鳥哢歡新節冷風送餘善寒竹𬒳荒蹊地為罕人逺是以植杖翁悠然不復返即理愧通識所保詎乃淺其二先師有遺訓憂道不憂貧瞻望邈難逮轉欲志長勤秉耒歡時務解顔勸農人平疇交逺風良苗亦懷新雖未量歲功即事多所欣耕種有時息行者無問津日入相與歸壷漿勞近鄰長吟掩柴門聊為隴畒民東坡曰平疇交逺風良苗亦懷新非古之耦耕植杖者不能道此語非豫之丗農亦不能識此語之妙癸卯十二月中作與從弟敬逺寢迹衡門下邈與世相絶顧眄莫誰知荆扉晝常閉閉必結切闔也淒淒歲暮風翳翳經日雪傾耳無希聲在目皓已潔潔或作結徑氣侵襟袖簞瓢謝屢設蕭索空宇中了無一可恱歷覽千載書時時見遺烈髙操非所攀深得固窮節平津苟不由漢元朔中武帝詔封公孫弘為平津侯栖遲詎為拙寄意一言外兹契誰能别鶴林曰傾耳無希聲在目皓已潔此十字雪之輕虛潔白盡在是矣後此者莫能加也乙巳歲三月為建威參軍使都經錢溪我不踐斯境歲月好巳積晨夕看山川事事悉如昔微雨洗髙林清飈矯雲翮眷彼品物存義風都未隔伊余何為者勉勵從兹役一形似有制素襟不可易園田日夢想安得久離析終懷在歸舟諒哉冝霜柏趙泉山曰此詩大旨慶遇安帝光復大業不失舊物也還舊居疇昔家上京南康志近城五里地名上京亦有淵明故居六載去還歸韓子蒼云淵明自庚子始作建威參軍由參軍為彭澤遂棄官歸是歲己巳故云六載趙泉山云自乙未佐鎮軍幕迄今六載韓説蓋誤今日始復來側愴多所悲阡陌不移舊邑屋或時非履歷周故居鄰老罕復遺步步尋往迹有處特依依流幻百年中寒暑日相推常恐大化盡氣力不及衰撥置且莫念一觴聊可揮戊申歲六月中遇火草廬寄窮巷甘以辭華軒正夏長風急林室頓燒燔一宅無遺宇舫舟蔭門前迢迢新秋夕亭亭月將圓亭亭髙也果菜始復生驚鳥尚未還中宵佇遙念一盼周九天總髮抱孤念奄出四十年形迹慿化往靈府長獨間貞剛自有質玉石乃非堅仰想東户時餘糧宿中田鼓腹無所思朝起暮歸眠既已不遇兹且遂灌西園按靖節舊宅居于柴桑縣之柴桑里至是屬回祿之變越後年徙居於南里之南村已酉歲九月九日靡靡秋已夕淒淒風露交蔓草不復榮園木空自凋清氣澄餘滓杳然天界髙哀蟬無歸響叢鴈鳴雲霄萬化相尋繹人生豈不勞從古皆有沒念之中心焦何以稱我情濁酒且自陶千載非所知聊以永今朝庚戌歲九月中於西田穫早稻人生歸有道衣食固其端孰是都不營而以求自安開春理常業歲功聊可觀晨出肆微勤日入負耒還山中饒霜露風氣亦先寒田家豈不苦弗獲辭此難四體誠乃疲庶無異患于盥濯息簷下斗酒散襟顔遙遙沮溺心千載乃相關但願長如此躬耕非所歎平聲觀此詩知靖節既休居惟躬耕是資故蕭德施曰安道苦節不以躬耕為恥丙辰歲八月中於下潠田舍穫潠蘇困切貧居依稼穡戮力東林隈不言春作苦常恐負所懷司田眷有秋寄聲與我諧飢者歡𥘉飽束帶候鳴雞揚擑越平湖泛隨清壑廽鬱鬱荒山裏猿聲間且哀悲風愛靜夜林鳥喜晨開曰余作此來三四星火頺姿年逝已老其事未云乖遙謝荷蓧翁聊得從君栖蔡寬夫曰秦漢已前字書未備既多假借而音無反切平仄皆通用自齊梁後既拘以四聲又限以音韻故士率以偶儷聲病為工文氣安得不卑弱惟淵明韓退之時時擺脫俗拘忌故栖字與乖字皆取其傍韻用蓋筆力自足以勝之飲酒十二首余間居寡歡兼比夜已長偶有名酒無夕不飲顧影獨盡忽焉復醉既醉之後輒題數句自娛紙墨遂多辭無詮次聊命故人書之以為歡笑爾其一衰榮無定在彼此更共之邵生瓜田中寧似東陵時漢蕭何博邵平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故丗謂東陵瓜寒暑有代謝人道每如兹逹人解其會逝將不復疑忽與一觴酒日夕歡相持黃山谷曰衰榮無定在彼此更共之此是西漢人文章他人多少語言盡得此理其二積善云有報夷叔在西山善惡苟不應何事空立言九十行帶索飢寒况當年列子孔子遊於太山見榮啓期行乎郕之野鹿裘帶索鼓琴而歌孔子曰先生所以樂何也對曰吾樂甚多天生萬物人為貴吾得為人一樂也男女之别男尊女卑吾得為男二樂也人生有不見日月不免襁褓者吾已行年九十矣三樂也貧者士之常死者人之終處常得終當何憂乎哉孔子曰善哉能自寬也不賴固窮節百世當誰傳詩眼曰近丗名士作詩云九十行帶索榮公老無依余謂之曰陶詩本非警䇿因有君詩乃見陶之工或譏余貴耳賤目則為解曰榮啓期事近出列子不言榮公可知九十則老可知行帶索則無依可知五字皆贅也若淵明意謂至於九十猶不免行而帶索則自少壯至於長老其飢寒艱苦冝如此窮士之所以可悲也此所謂君子於其言無所苟而已矣古人文章必不虛設其三道喪向千載人人惜其情有酒不肯飲但顧丗間名所以貴我身豈不在一生一生復能幾倐如流電驚鼎鼎百年內持此欲何成其四栖栖失羣鳥日暮猶獨飛徘徊無定止夜夜聲轉悲厲響思清逺去來何依依自值孤生松斂翮遙來歸徑風無榮木此蔭獨不衰託身已得所千載不相違趙泉山曰此詩譏切殷景仁顔延年輩附麗于宋其五結廬在人境而無車馬喧問君何能爾心逺地自偏採菊東籬下悠然見南山山氣日夕佳飛鳥相與還此中有真意欲辨已忘言王荆公曰淵明詩有竒絶不可及之語如結廬在人境四句由詩人以來無此句東坡曰採菊之次偶然見山𥘉不用意而景與意會故可喜也敬齋曰前輩有佳句𥘉未之知後人尋繹出來始見其工如淵明悠然見南山方在籬間把菊時安知其髙老杜佳句最多尤不自知也如是則撞破煙樓手段豈能有得耶蔡寬夫曰俗本多以見為望字若尓便有褰裳濡足之態矣一字之誤害理如此張九成曰此即淵明畎畒不忘君之意也其六行止千萬端誰知非與是是非苟相形雷同共譽毀三季多此事漢敘傳三季之後計云三代之末也逹士似不爾咄咄俗中惡咄丁骨切叱也且當從黃綺湯東澗曰此篇言季世出處不齊士皆以乘時自奮為賢吾知從黃綺而已世俗之是非毁譽非所計也其七秋菊有佳色裛露掇其英裛於汲切掇都奪切泛此忘憂物逺我遺世情逺于願切一觴雖獨進杯盡壷自傾日入群動息歸鳥趍林鳴嘯傲東軒下聊復得此生定齋曰自南北朝以來菊詩多矣未有能及淵明詩語盡菊之妙如秋菊有佳色他華不足以當此一佳字然終篇寓意髙逺皆繇菊而發耳艮齋曰秋菊有佳色一語洗盡古今塵俗氣東坡曰靖節以無事為得此生則見役於物者非失此生耶韓子蒼曰余嘗謂古人寄懷於物而無所好然後為逹况淵明之真其於黃花直寓意耳至言飲酒適意亦非淵明極致向使無酒但悠然見南山其樂多矣遇酒輒醉醉醒之後豈知有江州太守哉當以此論淵明其八青松在東園衆草沒竒姿凝霜殄異類卓然見髙枝連林人不覺獨樹衆乃竒提壷挂寒柯逺望時復為吾生夢幻間何事紲塵羈其九清晨聞叩門倒裳往自開問子為誰歟田父有好懷壷漿逺見候疑我與時乖繿縷茅簷下未足為髙栖一世皆尚同願君汩其泥汩古沒切深感父老言稟氣寡所諧紆轡誠可學違巳詎非迷且共歡此飲吾駕不可回趙氏注杜甫宿羌村第二首云一篇之中賓主既具問答了然可以比淵明此首趙泉山曰時輩多勉靖節以出仕故作是篇其十在昔曽逺遊直至東海隅道路􅒯且長風波阻中塗此行誰使然似為飢所驅傾身營一飽少許便有餘恐此非名計息駕歸間居趙泉山曰此篇述其為貧而仕其十一顔生稱為仁榮公言有道屢空不獲年長飢至于老雖留身後名一生亦枯稿死去何所知稱心固為好客養千金軀臨化消其寶祼葬何必惡前漢揚王孫臨終令其子曰吾欲祼葬以反吾真死則為布囊盛尸入地七尺既下從足引脫其囊以身親土其子遂祼葬人當解意表東坡曰客養千金軀臨化消其寶寶不過軀軀化則寶亡矣人言靖節不知道吾不信也東澗曰顔榮皆非希身後名正以自遂其志耳保千金之軀者亦終歸於盡則祼葬亦未可非也或曰前八句言名不足賴後四句言身不足惜淵明解處正在身名之外也其十二長公曽一仕壯節忽失時杜門不復出終身與世辭張釋之子張摰字長公官至大夫免以不能取容當世終身不仕仲理楊倫歸大澤髙風始在兹一往便當已何為復狐疑去去當奚道世俗久相欺擺落悠悠談請從余所之其十三有客常同止趣捨邈異境一士長獨醉一夫終年醒醒醉還相笑發言各不領規規一何愚兀傲差若穎寄言酣中客日沒燭當炳湯東澗曰醒者與世計分曉而醉者頺然聽之而已淵明蓋沈冥之逃者故以醒為愚而以兀傲為頴耳其十四故人賞我趣挈壷相與至班荆坐松下數斟已復醉父老雜亂言觴酌失行次不覺知有我安知物為貴悠悠迷所留酒中有深味張文潛曰陶元亮雖嗜酒家貧不能常飲酒而况必飲美酒乎其所與飲多田野樵漁之人班坐林間所以奉身而恱口腹者略矣石林詩話曰晉人多言飲酒有至沉醉者此未必意真在酒蓋方時艱人各懼禍惟託於醉可以粗逺世故耳其十五貧居乏人工灌木荒余宅灌木叢木也班班有翔鳥寂寂無行迹宇宙一何悠人生少至百歲月相催逼鬢邊早已白若不委窮逹素抱深可惜其十六少年罕人事遊好在六經行行向不惑淹留遂無成竟抱固窮節飢寒飽所更弊廬交悲風荒草沒前庭披褐守長夜晨雞不肯鳴孟公不在兹終以翳吾情前漢陳遵字孟公嗜酒每大飲賓客滿堂其十七幽蘭生前庭含薰待清風清風脫然至見别蕭艾中行行失故路任道或能通覺悟當念還鳥盡廢良弓湯東澗曰蘭薰非清風不能别賢者出處之致亦待知者知耳淵明在彭澤日有悵然慷慨深愧平生之語所謂失故路也惟其任道而不牽於俗故卒能回車復路云耳鳥盡弓藏蓋借昔人去國之語以喻己歸田之志其十八子雲性嗜酒家貧無由得時賴好事人載醪祛所惑揚雄家貧嗜酒人希至其門好事者載酒肴從遊學觴來為之盡是咨無不塞有時不肯言豈不在伐國仁者用其心何嘗失顯默湯東澗曰此篇蓋托子雲以自况故以柳下惠事終之五枊先生傳云性嗜酒家貧不能常得親舊或置酒招之造飲輒盡其十九疇昔苦長飢投耒去學仕將養不得節凍餒固纒巳是時向立年志意多所恥遂盡介然分終死歸田里冉冉星氣流亭亭復一紀世路廓悠悠楊朱所以止淮南説林訓楊子見逵路而哭之為其可以南可以北墨子見練絲而泣之為其可以黃可以黑雖無揮金事文選張協詠二踈詩云揮金樂當年濁酒聊可恃按彭澤之歸在義熙元年乙巳此云復一紀則賦此飲酒當是義熙十二三年間其二十羲農去我久舉世少復真汲汲魯中叟孔子彌縫使其淳鳯鳥雖不至禮樂暫得新洙泗輟微響漂流逮狂秦詩書復何罪一朝成灰塵區區諸老翁為事誠殷勤如何絶世下六籍無一親終日馳車走不見所問津若復不快飲空負頭上巾但恨多謬誤君當恕醉人東澗曰諸老翁似謂漢𥘉伏生諸人退之所謂羣儒區區修輔者劉歆移太常書亦可見不見所問津蓋淵明自况於沮溺而歎世無孔子徒也東坡曰但恐多謬誤君當恕醉人此未醉時説也若已醉何假憂誤哉然世人言醉時是醒時語此最名言止酒居止次城邑逍遙自間止坐止髙蔭下步止蓽門裏好味止園葵大歡止稚子平生不止酒止酒情無喜暮止不安寢晨止不能起日日欲止之營衛止不理徒知止不樂未知止利己始覺止為善今朝真止矣從此一止去將止扶桑涘山海經云黑齒之北曰陽谷有扶木九日居下枝一日居上枝皆戴烏郭璞云扶木扶桑也清顔止宿容奚止千萬祀胡仔曰坐止髙蔭下四句余反覆味之然後知淵明之用意非獨止酒於此四者皆欲止之故坐止於樹蔭之下則廣厦華堂吾何羡焉步止於蓽門之裏則朝市深利吾何趍焉好味止於噉園葵則五鼎方丈吾何欲焉大歡止於戲稚子則燕歌趙舞吾何樂焉在彼者難求而在此者易為也淵明固窮守道安於丘園疇肯以此易彼乎述酒舊注儀狄造杜康潤色之一本云此篇與題非本意諸本如此誤重離照南陸鳴鳥聲相聞秋草雖未黃融風久已分素礫皛修渚南嶽無餘雲豫章抗髙門重華固靈墳豫章宋武始封重華斥恭帝揖遜事流淚抱中歎傾耳聽司晨神州獻嘉粟西靈為我馴諸梁董師旅羊勝喪其身黃山谷云羊勝當是芊勝芊勝白公也沈諸梁葉公也殺白公勝山陽歸下國魏降漢獻帝為山陽公卒弒之成名猶不勤卜生善斯牧安樂不為君平王從韓子蒼本舊作生去舊京峽中納遺薰雙陵甫云育三趾顯竒文王子愛清吹日中翔河汾朱公練九齒間居離世紛峩峩西嶺內偃息常所親天容自永固彭殤非等倫黃山谷曰此篇有其義而亡其辭似是讀異書所作其中多不可解韓子蒼曰余反覆之見山陽歸下國之句蓋用山陽公事疑是義熙以後有所感而作也故有流淚抱中歎平王去舊京之語淵明忠義如此今人或謂淵明所題甲子不必皆義熙後此亦豈足論淵明哉惟其髙舉逺蹈不受丗紛而至於躬耕乞食其忠義亦足見矣趙泉山曰此晉恭帝元熙二年也六月十一日宋王𥙿迫帝禪位既而廢帝為零陵王明年九月潛行弒逆故靖節詩中引用漢獻事今推子蒼意考其退休後所作詩類多悼國傷時感諷之語然不欲顯斥故命篇云雜詩或託以述酒飲酒擬古惟述酒間寓以他語使漫奧不可指擲今於各篇姑見其一二句警要者餘章自可意逆也如豫章抗髙門重華固靈墳此豈述酒語耶三季多此事慷慨爭此埸忽值山河改其微旨端有在矣類之風雅無愧誄稱靖節道必懷邦劉良注懷邦者不忘於國故無為子曰詩家視淵明猶孔門視伯夷也湯東澗曰按晉元熙二年六月劉𥙿廢恭帝為零陵王明年以毒酒一罌授張偉使鴆王偉自飲而卒繼又令兵人踰垣進藥王不肯飲遂掩殺之此詩所為作故以述酒名篇詩辭盡隱語故觀者弗省獨韓子蒼以山陽下國一語疑是義熙後有感而賦豫反覆詳考而後知決為零陵哀詩也昔蘇子讀述史九章曰去之五百歲吾猶見其人也豈虛言哉責子舒儼宣俟雍份端佚通佟九五人舒宣雍端通皆小名也白髮𬒳兩鬢肌膚不復實雖有五男兒揔不好紙筆阿舒儼已二八懶惰故無匹阿宣俟行志學而不愛文術雍份端佚年十三不識六與七通佟子垂九齡但覔梨與栗天運苟如此且進杯中物黃山谷曰觀淵明此詩想見其人慈祥戲謔可觀也俗人便謂淵明諸子皆不肖而淵明愁歎見於詩耳所謂癡人前不得説夢也有會而作舊榖既沒新榖未登頗為老農而值年災日月尚悠為患未已登歲之功既不可希朝夕所資煙火裁通旬日已來始念飢乏歲云夕矣慨然永懷今我不述後生何聞哉弱年逢家乏老至更長飢菽麥實所羡孰敢慕甘肥惄如亞九飯惄飢也當暑厭寒衣歲月將欲暮如何辛苦悲常善粥者心深恨蒙𬒮非嗟來何足吝徒沒空自遺斯濫豈彼志固窮夙所歸餒也巳矣夫在昔余多師趙泉山曰此篇述其艱食之悰尤為酸楚老至更長飢是終身未嘗足食也蠟日蠟助駕切蠟臘祭名伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也風雪送餘運無妨時已和梅桞夾門植一條有佳花我唱爾言得酒中適何多未能明多少章山有竒歌四時此顧凱之神情詩類文有全篇然顧詩首尾不類獨此警絶春水滿四澤夏雲多竒峯秋月揚明暉冬嶺秀孤松劉斯立曰當是凱之用此足成全篇篇中惟此警䇿居然可知或雖顧作淵明摘出四句可謂善擇許彥國詩話曰此詩乃顧長康詩誤入彭澤集箋注陶淵明集卷之三
