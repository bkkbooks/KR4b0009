front:
  text: 箋注陶淵明集卷之七
  hash: sha256:3965b81b77e9c0555ac830421290d9b5d92acbb79399a4b84fc76d77e00f028a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4b0009_SBCK_007-1a}
body:
  text: 天子孝傳贊虞舜夏禹殷髙宗周文王虞舜父頑母嚚事之於畎畒之間以孝蒸蒸是以堯聞而授之冨有天下貴為天子以為不順於父母若窮而無歸惟聞親可以得意苟違朝夕若嬰兒之思戀故稱舜五十而慕書曰戞擊鳴球搏拊琴瑟以詠祖考來格言思其來而訓一作謂之愛敬盡於事親是以德教加於百姓刑于四海夏禹有天下以奉宗廟然躬自菲薄以厚其孝孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕禹之德於是稱聞聖人之德無以加於孝敬孝敬之道美莫大焉殷髙宗諒隂三年不言百官揔巳而聽於冡宰三年而後言天下咸歡德教大行殷道以興詩曰一人有慶兆民賴之其此之謂乎周文王之為丗子也朝於王季日三雞鳴至於寢門問於內竪內竪曰安文王乃喜不安則色憂行不能正履日中暮亦如之食上必視寒溫之節食下必問所膳而後退文王孝道光大其化自近至逺刑干寡妻以御于家邦故得萬國之歡心以事其先王矣贊曰至哉后德聖敬自天陶漁致飬菲薄饗先親瘠色憂諒隂寢言一人有慶千載賴旃諸侯孝傳贊周公旦魯孝公河間惠王周公旦武王之弟成王幼少周公攝政制禮作樂郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭詩曰於穆清廟肅雍顯相言諸侯樂其位而敬其事也仲尼曰孝莫大於嚴父嚴父莫大於配天則周公其人也貴而不驕位髙彌謙自承文武之休烈孝道通于神明光𬒳四海武王封之於魯備其禮樂以奉宗廟焉魯孝公之為公子周宣王問公子能道訓諸侯者立之樊穆仲稱其孝曰肅恭明神而敬事耆老賦事行刑必問於遺訓咨於故實不干所問不犯所咨王曰然則能訓理其民矣乃命之於夷宫是為孝公夫宗廟致敬不忘親也有國不亦冝乎漢河間惠王獻王之曽孫也西京藩臣多驕放之失其名德者唯獻王而惠王繼之漢書稱其能修獻王之行母薨服喪盡禮哀帝下詔書褒揚以為宗室儀表增封萬户禮古之人皆然至於末俗衰薄固巳賢矣貴而率禮又難其見褒賞不亦冝乎贊曰貴驕殊途不期而會周公勞謙乃成光大二侯承魯遵儉去泰河間率禮漢宗是賴卿大夫孝傳贊孔子孟莊子頴考叔孔子魯人也入則事父兄出則事公卿喪事不敢不勉故稱曰孝乎惟孝友于兄弟是亦為政也君賜腥必熟而薦之雖𬞞食而齊祭如在鄉人儺朝服立于阼階孝之至也至德要道莫大於孝是以曽參受而書之遊夏之徒常咨稟焉許止不嘗藥書以殺父宰我暫言減喪責以不仁言合訓典行合丗範德義可尊作事可法遺文不朽揚名千載孟莊子魯人也孔子稱其孝其他可能也其不改父之政與父之臣是難能也夫孝子之事親也事亡如事存故當不義則爭之存所不爭則亡亦不敢改父之道猶謂之孝况終身乎頴考叔鄭人也莊公以叔假之故與母誓曰不及黃泉無相見也既而悔之考叔為封人聞之有獻於公公賜之食而舍肉公問之對曰小人有母未嘗君之羹請以遺之公曰汝有母遺繄我獨無考叔曰何謂也公語之故且告之悔考叔曰若掘地及泉隧而相見其誰曰不然公從之遂為母子如𥘉君子曰頴考叔純孝也愛其母而施及莊公詩云孝子不匱永錫爾類其是之謂乎贊曰仁惟本悌聖亦基孝恂恂尼父固天攸造一作導二子承親式禮遵誥永錫純懿無改遺操士孝傳贊髙柴樂正子春孔奮黃香髙柴衛人也喪親泣血三年未嘗見齒所謂哭不偯言不文也為武城宰而化行民有不服其親者改之行喪如禮君子之德風也以身先之而民不遺其親樂正子春魯人也下堂傷足既瘳數月不出猶有憂色曰吾聞之曽子父母全而生之巳全而歸之可謂孝矣故君子一舉足一出言不敢忘父母不敢毁傷孝之始也夫能敬慎若斯而災患及者未之有也孔奮扶風人也少以孝行著名州里供飬至謹在官唯母極甘美妻息菜食歷位以清夫人情莫不欲厚其親然亦有分焉奮則難繼能致儉以全飬者鮮矣黃香江夏人也九歲失思慕骨立事父竭力以致飬冬無𬒳袴而盡滋味暑則扇床枕寒則以身溫席漢和帝嘉之特加異賜歷位恭勤寵祿榮親可謂夙興夜寐無忝爾所生者也贊曰顯允群士行殊名鈞咸能夙夜以義榮親率彼城邑用化厥民忠以悟主其孝乃純庶人孝傳贊江革廉範汝郁殷陶江革齊人也漢章帝時避賊負母而逃賊賢之不害而告其生路竭力傭債以致甘暖和顔恱色以盡歡心欲親之安自挽車以行鄉人歸之號曰江巨孝位至五官中郎將天子嘉焉寵遇甚厚告歸詔書褒美就家禮其終身以顯異行廉範京兆人也少孤十五入蜀迎父喪遇石船覆範執骸一祚抱棺而沒船人救之僅免于死遂以喪歸及仕郡拯太守於危難送故盡節章帝時為郡守百姓歌詠之夫孝者人之本教之所由生也是以範之臨危也勇宰民也惠能以義顯也汝郁陳郡人也五歲母病不食郁亦不食母憐之強食郁能察色知病輒復不食族人號曰異童年十五著於鄉里父母終思慕致毀推財與兄弟隱於草澤君子以為難况童齓孝於自然可謂天性也殷陶汝南人也年十二以孝稱遭父憂率情合禮有長蛇帶其門舉家奔走陶以喪柩在馬獨居廬不動親戚扶持曉喻莫能移之帝號益盛由是顯名屢辭辟命夫智者不惑勇者不懼陶孝於其親而智勇並彰乎弱齡斯又難矣贊曰事親盡歡其難在色彼飬以祿我飬以力義在一作存愛敬榮不假飾嗟爾衆庶鑒兹前式扇上畫贊荷蓧丈人長沮桀溺於陵仲子張長公丙曼容鄭次都薛孟嘗周陽圭三五道邈淳風日盡九流參差牙相推隕形逐物遷心無常凖是以逹人有時而隱四體不勤五榖不分超超丈人日夕在耘遼遼沮溺耦耕自欣入鳥不駭雜獸斯群至矣於陵飬氣浩然蔑彼結駟甘此灌園張生一仕曽以事還顧我不能髙謝人間岧岧丙公望崖輒歸匪驕匪吝前路威夷鄭叟不合垂鈞川湄交酌林下清言究微孟嘗逰學天網時踈眷言哲友振褐偕徂美哉周子稱疾間居寄心清尚悠然自娛翳翳衡門洋洋泌流曰琴曰書顧盻有儔飲河既足自外皆休緬懷千載託契孤逰箋注陶淵明集卷之七
